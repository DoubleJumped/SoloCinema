<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoloCinema — A Private Screening Service</title>
<meta name="description" content="Every showtime in Regina, ranked by how close you'll get to having the room to yourself.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,300;1,500&family=Jost:wght@300;400;500&display=swap">

<style>
  :root{
    --house-black:#0E0A09;
    --velvet:#1C1210;
    --oxblood:#7A2E2A;
    --brass:#C89B5A;
    --screen-glow:#F3E9D7;
    --warm-muted:#A89C8A;

    --brass-rgb:200,155,90;
    --glow-rgb:243,233,215;
    --oxblood-rgb:122,46,42;

    --border-soft:rgba(var(--brass-rgb),.12);
    --border-warm:rgba(var(--brass-rgb),.30);
    --seat-void:rgba(var(--glow-rgb),.10);

    --display:"Cormorant Garamond", Georgia, serif;
    --ui:"Jost", system-ui, sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--house-black);
    color:var(--screen-glow);
    font-family:var(--ui);
    font-weight:300;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    line-height:1.5;
    overflow-x:hidden;
  }

  ::selection{background:rgba(var(--oxblood-rgb),.6);color:var(--screen-glow);}

  a{color:inherit;}

  :focus-visible{
    outline:2px solid var(--brass);
    outline-offset:3px;
    border-radius:2px;
  }

  .caps{
    font-family:var(--ui);
    text-transform:uppercase;
    letter-spacing:.16em;
    font-size:.72rem;
    font-weight:400;
  }

  /* ---------- programme top bar ---------- */
  .programme-bar{
    max-width:1000px;
    margin:0 auto;
    padding:16px clamp(16px,4vw,32px) 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    border-bottom:1px solid var(--border-soft);
    color:var(--warm-muted);
  }
  .programme-bar span{white-space:nowrap;}
  .programme-bar .pb-center{
    color:var(--brass);
    letter-spacing:.2em;
  }
  .programme-bar .pb-right .live{
    display:inline-block;
    width:5px;height:5px;border-radius:50%;
    background:var(--brass);
    box-shadow:0 0 6px rgba(var(--brass-rgb),.8);
    margin-right:7px;
    vertical-align:middle;
    animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    max-width:900px;
    margin:0 auto;
    padding:clamp(40px,8vw,84px) clamp(16px,4vw,32px) clamp(20px,4vw,34px);
    text-align:center;
    overflow:hidden;
  }
  /* projector beam */
  .hero::before{
    content:"";
    position:absolute;
    top:-60px;
    left:50%;
    transform:translateX(-50%);
    width:min(560px,90vw);
    height:340px;
    background:
      radial-gradient(60% 78% at 50% 0%,
        rgba(var(--brass-rgb),.10) 0%,
        rgba(var(--brass-rgb),.05) 28%,
        rgba(var(--brass-rgb),.015) 52%,
        transparent 72%);
    filter:blur(6px);
    pointer-events:none;
    z-index:0;
  }
  .hero > *{position:relative;z-index:1;}

  .eyebrow{
    color:var(--brass);
    margin:0 0 clamp(14px,3vw,22px);
    letter-spacing:.34em;
    font-size:clamp(.62rem,1.6vw,.74rem);
    text-transform:uppercase;
    font-weight:400;
  }
  h1.title{
    font-family:var(--display);
    font-style:italic;
    font-weight:300;
    font-size:clamp(3.4rem,15vw,7.6rem);
    line-height:.92;
    letter-spacing:-.01em;
    margin:0;
    color:var(--screen-glow);
  }
  .subtitle{
    max-width:34em;
    margin:clamp(18px,3vw,26px) auto 0;
    color:var(--warm-muted);
    font-weight:300;
    font-size:clamp(.9rem,2.4vw,1.02rem);
    line-height:1.6;
  }

  /* double programme rule */
  .rule-double{
    max-width:880px;
    margin:clamp(30px,5vw,44px) auto 0;
    padding:0 clamp(16px,4vw,32px);
  }
  .rule-double span{
    display:block;
    height:1px;
    background:rgba(var(--brass-rgb),.5);
  }
  .rule-double span + span{
    margin-top:3px;
    background:rgba(var(--brass-rgb),.24);
  }

  /* ---------- filter row ---------- */
  .filters{
    max-width:880px;
    margin:clamp(26px,4vw,38px) auto clamp(12px,3vw,20px);
    padding:0 clamp(16px,4vw,32px);
    display:flex;
    flex-wrap:wrap;
    gap:clamp(16px,3vw,30px) clamp(20px,4vw,40px);
    justify-content:center;
  }
  .filter-group{
    display:flex;
    flex-direction:column;
    gap:9px;
    align-items:center;
  }
  .filter-label{
    color:var(--warm-muted);
    letter-spacing:.24em;
    font-size:.6rem;
    text-transform:uppercase;
  }
  .pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
  .pill{
    font-family:var(--ui);
    font-size:.7rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-weight:400;
    color:var(--warm-muted);
    background:transparent;
    border:1px solid var(--oxblood);
    border-radius:999px;
    padding:6px 14px;
    cursor:pointer;
    transition:color .2s ease, background-color .2s ease, border-color .2s ease;
  }
  .pill:hover{color:var(--screen-glow);border-color:rgba(var(--brass-rgb),.55);}
  .pill[aria-pressed="true"]{
    background:var(--oxblood);
    border-color:var(--oxblood);
    color:var(--brass);
  }

  /* ---------- programme list ---------- */
  main{
    max-width:880px;
    margin:0 auto;
    padding:clamp(16px,3vw,26px) clamp(16px,4vw,32px) clamp(50px,8vw,90px);
  }
  .list-count{
    color:var(--warm-muted);
    letter-spacing:.18em;
    font-size:.68rem;
    text-transform:uppercase;
    margin:0 0 20px;
    text-align:center;
  }
  .list-count b{color:var(--brass);font-weight:400;}

  .programme-list{
    list-style:none;
    margin:0;padding:0;
    display:flex;
    flex-direction:column;
    gap:clamp(14px,2.4vw,20px);
  }

  .screening{
    display:flex;
    align-items:stretch;
    gap:clamp(18px,4vw,40px);
    background:var(--velvet);
    border:1px solid var(--border-soft);
    border-radius:4px;
    padding:clamp(20px,3vw,28px) clamp(20px,3.4vw,32px);
    opacity:0;
    transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .is-ready .screening{
    animation:rise .55s ease forwards;
    animation-delay:calc(var(--i) * 60ms + .35s);
  }
  .screening.settled{animation:none;opacity:1;}
  .screening.settled:hover{
    transform:translateY(-2px);
    border-color:var(--border-warm);
    box-shadow:0 12px 34px rgba(0,0,0,.45);
  }
  @keyframes rise{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:none;}
  }

  .screening-main{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;}
  .screening-headline{
    display:flex;
    align-items:baseline;
    flex-wrap:wrap;
    gap:8px 12px;
    margin-bottom:2px;
  }
  .screening-time{
    color:var(--brass);
    font-variant-numeric:tabular-nums;
    letter-spacing:.1em;
    font-size:.82rem;
    font-weight:400;
    text-transform:uppercase;
  }
  .screening-time .dot-sep{opacity:.55;margin:0 .35em;}

  .badge-private{
    font-family:var(--ui);
    font-size:.6rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--brass);
    border:1px solid rgba(var(--brass-rgb),.6);
    border-radius:2px;
    padding:2px 8px 1px;
    line-height:1.4;
  }

  .screening-title{
    font-family:var(--display);
    font-weight:500;
    font-size:clamp(1.7rem,5vw,2.25rem);
    line-height:1.04;
    letter-spacing:.005em;
    margin:.15em 0 .35em;
    color:var(--screen-glow);
  }
  .screening-meta{
    color:var(--warm-muted);
    text-transform:uppercase;
    letter-spacing:.1em;
    font-size:.68rem;
    font-weight:400;
    margin-top:auto;
  }
  .screening-meta .fmt{color:rgba(var(--glow-rgb),.7);}

  /* signature: seat matrix */
  .signature{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    text-align:right;
  }
  .seat-matrix{
    display:grid;
    grid-template-columns:repeat(12,6px);
    grid-auto-rows:6px;
    gap:3px;
    justify-content:end;
  }
  .dot{
    width:6px;height:6px;
    border-radius:50%;
    background:var(--seat-void);
  }
  .dot--on{
    background:var(--seat-void);
    transition:background-color .55s ease, box-shadow .55s ease;
  }
  .screening.settled .dot--on{
    background:var(--brass);
    box-shadow:0 0 5px rgba(var(--brass-rgb),.65);
    transition-delay:calc(var(--d) * 16ms + .1s);
  }
  .dot--void{
    background:transparent;
    border:1px solid rgba(var(--glow-rgb),.14);
    width:6px;height:6px;
    opacity:.6;
  }
  .seat-caption{
    color:var(--warm-muted);
    text-transform:uppercase;
    letter-spacing:.12em;
    font-size:.64rem;
    font-weight:400;
    line-height:1.6;
  }
  .seat-caption .num{color:var(--brass);}
  .seat-caption .checked{
    display:block;
    font-size:.58rem;
    letter-spacing:.14em;
    color:rgba(var(--glow-rgb),.4);
    margin-top:2px;
  }
  .seat-caption--unavailable{color:rgba(var(--glow-rgb),.4);}

  .reserve{
    font-family:var(--ui);
    font-size:.7rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--brass);
    text-decoration:underline;
    text-underline-offset:5px;
    text-decoration-thickness:1px;
    text-decoration-color:rgba(var(--brass-rgb),.45);
    transition:text-decoration-color .2s ease, color .2s ease;
    white-space:nowrap;
  }
  .reserve:hover{text-decoration-color:var(--brass);}

  /* hero + filters entrance */
  .hero,.filters,.list-count{
    opacity:0;
    transform:translateY(10px);
    transition:opacity .7s ease, transform .7s ease;
  }
  .is-ready .hero{opacity:1;transform:none;}
  .is-ready .filters{opacity:1;transform:none;transition-delay:.15s;}
  .is-ready .list-count{opacity:1;transform:none;transition-delay:.25s;}

  /* footer */
  footer{
    text-align:center;
    color:var(--warm-muted);
    padding:0 24px clamp(40px,7vw,70px);
  }
  footer .colophon{
    font-size:.66rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.7;
  }
  footer .foot-rule{
    width:38px;height:1px;
    background:rgba(var(--brass-rgb),.4);
    margin:0 auto 22px;
  }

  .noscript{
    max-width:600px;margin:40px auto;text-align:center;color:var(--warm-muted);
    padding:0 24px;font-size:.85rem;
  }

  /* ---------- responsive: stack ---------- */
  @media (max-width:620px){
    .screening{flex-direction:column;gap:20px;}
    .signature{
      align-items:flex-start;
      text-align:left;
      flex-direction:column;
      gap:12px;
      width:100%;
    }
    .seat-matrix{justify-content:start;}
  }
  @media (max-width:520px){
    .programme-bar .pb-center{display:none;}
    .programme-bar{font-size:.6rem;}
  }
  @media (max-width:380px){
    .programme-bar{flex-wrap:wrap;gap:6px;justify-content:center;}
    .pill{padding:5px 11px;font-size:.66rem;}
  }

  @media (prefers-reduced-motion:reduce){
    *{
      animation-duration:.001ms !important;
      animation-delay:0ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.001ms !important;
      transition-delay:0ms !important;
    }
    .hero,.filters,.list-count,.screening{opacity:1 !important;transform:none !important;}
  }
</style>

<div class="programme-bar caps">
  <span class="pb-left">Regina · Saskatchewan</span>
  <span class="pb-center">Tonight's Programme</span>
  <span class="pb-right"><span class="live" aria-hidden="true"></span><span id="lastChecked">Last checked 8 min ago</span></span>
</div>

<header class="hero">
  <p class="eyebrow">A Private Screening Service</p>
  <h1 class="title">SoloCinema</h1>
  <p class="subtitle">Every showtime in the city, ranked by how close you&rsquo;ll get to having the room to yourself.</p>
</header>

<div class="rule-double" aria-hidden="true"><span></span><span></span></div>

<section class="filters" aria-label="Filter screenings">
  <div class="filter-group" data-filter="chain">
    <span class="filter-label">House</span>
    <div class="pills" role="group" aria-label="Filter by chain">
      <button class="pill" data-value="all" aria-pressed="true">All</button>
      <button class="pill" data-value="Landmark" aria-pressed="false">Landmark</button>
      <button class="pill" data-value="Cineplex" aria-pressed="false">Cineplex</button>
      <button class="pill" data-value="Other" aria-pressed="false">Other</button>
    </div>
  </div>
  <div class="filter-group" data-filter="day">
    <span class="filter-label">Evening</span>
    <div class="pills" role="group" aria-label="Filter by day">
      <button class="pill" data-value="all" aria-pressed="true">All</button>
      <button class="pill" data-value="tonight" aria-pressed="false">Tonight</button>
      <button class="pill" data-value="tomorrow" aria-pressed="false">Tomorrow</button>
    </div>
  </div>
  <div class="filter-group" data-filter="format">
    <span class="filter-label">Format</span>
    <div class="pills" role="group" aria-label="Filter by format">
      <button class="pill" data-value="all" aria-pressed="true">All</button>
      <button class="pill" data-value="standard" aria-pressed="false">Standard</button>
      <button class="pill" data-value="premium" aria-pressed="false">Premium</button>
    </div>
  </div>
</section>

<p class="list-count caps" id="listCount"></p>

<main>
  <ul class="programme-list" id="programme"></ul>
  <noscript><p class="noscript">Tonight&rsquo;s programme requires a browser with JavaScript to render the seat maps.</p></noscript>
</main>

<footer>
  <div class="foot-rule" aria-hidden="true"></div>
  <p class="colophon">Occupancy inferred from public seat maps · Not affiliated with any theatre</p>
</footer>

<script>
(function(){
  "use strict";

  const SCREENINGS = [
   {id:1,title:"The Quiet Frame",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T19:15",format:"Laser Ultra",occupied:0,total:84,confidence:"high",checkedMin:12},
   {id:2,title:"Northern Vacancy",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-05T19:40",format:"Regular",occupied:0,total:112,confidence:"medium",checkedMin:23},
   {id:3,title:"Prairie Signal",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-05T20:20",format:"Regular",occupied:1,total:116,confidence:"high",checkedMin:8},
   {id:4,title:"The Wascana Drift",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T20:45",format:"Recliner",occupied:2,total:74,confidence:"high",checkedMin:12},
   {id:5,title:"Static Matinee",theater:"Rainbow Cinemas Golden Mile",chain:"Other",time:"2026-07-05T21:00",format:"Regular",occupied:3,total:180,confidence:"low",checkedMin:41},
   {id:6,title:"Copper Sky",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-05T21:30",format:"3D",occupied:4,total:96,confidence:"medium",checkedMin:8},
   {id:7,title:"Midnight Elevator",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T22:10",format:"Laser Ultra",occupied:6,total:84,confidence:"high",checkedMin:12},
   {id:8,title:"Hollow Harvest",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-05T22:30",format:"IMAX",occupied:9,total:210,confidence:"high",checkedMin:23},
   {id:9,title:"Second Reel",theater:"Rainbow Cinemas Golden Mile",chain:"Other",time:"2026-07-06T13:30",format:"Regular",occupied:null,total:null,confidence:"low",checkedMin:41},
   {id:10,title:"Dust & Neon",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-06T16:45",format:"VIP 19+",occupied:14,total:48,confidence:"medium",checkedMin:8},
   {id:11,title:"The Long Interval",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-06T19:00",format:"Recliner",occupied:22,total:74,confidence:"high",checkedMin:12},
   {id:12,title:"Late Show North",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-06T21:50",format:"Regular",occupied:31,total:112,confidence:"high",checkedMin:23}
  ];

  const COLS = 12;
  const CAP = 120;
  const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // deterministic PRNG (mulberry32)
  function mulberry32(a){
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // choose which rendered seats are occupied: center-back cluster, seeded per id
  function occupiedIndices(id, renderTotal, renderOcc){
    if(renderOcc <= 0) return new Set();
    const rows = Math.ceil(renderTotal / COLS);
    const center = (COLS - 1) / 2;
    const rng = mulberry32(id * 9973 + 12345);
    const seats = [];
    for(let idx=0; idx<renderTotal; idx++){
      const r = Math.floor(idx / COLS);
      const c = idx % COLS;
      const rowFactor = rows > 1 ? (r / (rows - 1)) : 1;      // back rows heavier
      const colFactor = 1 - Math.abs(c - center) / center;    // centre heavier
      const pref = 0.55 * rowFactor + 0.45 * colFactor;
      const jitter = rng() * 0.6;
      seats.push({idx:idx, score:pref + jitter});
    }
    seats.sort((a,b)=> b.score - a.score);
    const set = new Set();
    const n = Math.min(renderOcc, seats.length);
    for(let i=0;i<n;i++) set.add(seats[i].idx);
    return set;
  }

  function fmtTime(iso){
    const d = new Date(iso);
    let h = d.getHours();
    const m = d.getMinutes();
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    return h + ':' + String(m).padStart(2,'0') + ' ' + ap;
  }
  function dayLabel(iso){
    return iso.slice(0,10) === '2026-07-05' ? 'Tonight' : 'Tomorrow';
  }
  function dayKey(iso){
    return iso.slice(0,10) === '2026-07-05' ? 'tonight' : 'tomorrow';
  }
  function formatBucket(fmt){
    return fmt === 'Regular' ? 'standard' : 'premium';
  }

  function buildSignature(s){
    if(s.occupied === null || s.total === null){
      // dimmed outlined placeholder grid (4 rows)
      let voids = '';
      for(let i=0;i<COLS*4;i++) voids += '<span class="dot dot--void"></span>';
      return '<div class="signature">' +
        '<div class="seat-matrix" aria-hidden="true">' + voids + '</div>' +
        '<p class="seat-caption seat-caption--unavailable">Seat map unavailable</p>' +
        '<a class="reserve" href="#">Reserve the room &rarr;</a>' +
      '</div>';
    }

    const renderTotal = Math.min(s.total, CAP);
    const renderOcc = s.total > CAP
      ? Math.round(s.occupied * renderTotal / s.total)
      : s.occupied;
    const occ = occupiedIndices(s.id, renderTotal, renderOcc);

    let dots = '';
    let d = 0;
    for(let i=0;i<renderTotal;i++){
      if(occ.has(i)){
        dots += '<span class="dot dot--on" style="--d:' + d + '"></span>';
        d++;
      }else{
        dots += '<span class="dot"></span>';
      }
    }

    const caption = '<span class="num">' + s.occupied + '</span> of ' +
                    '<span class="num">' + s.total + '</span> seats taken' +
                    '<span class="checked">Checked ' + s.checkedMin + ' min ago</span>';

    return '<div class="signature">' +
      '<div class="seat-matrix" role="img" aria-label="' + s.occupied + ' of ' + s.total + ' seats taken">' + dots + '</div>' +
      '<p class="seat-caption">' + caption + '</p>' +
      '<a class="reserve" href="#">Reserve the room &rarr;</a>' +
    '</div>';
  }

  function buildCard(s, i){
    const li = document.createElement('li');

    const isPrivate = s.occupied === 0;
    const badge = isPrivate
      ? '<span class="badge-private">Private</span>'
      : '';

    li.innerHTML =
      '<article class="screening" style="--i:' + i + '">' +
        '<div class="screening-main">' +
          '<div class="screening-headline">' +
            '<span class="screening-time">' + fmtTime(s.time) +
              '<span class="dot-sep">·</span>' + dayLabel(s.time) + '</span>' +
            badge +
          '</div>' +
          '<h2 class="screening-title">' + s.title + '</h2>' +
          '<p class="screening-meta">' + s.theater +
            ' <span class="fmt">· ' + s.format + '</span></p>' +
        '</div>' +
        buildSignature(s) +
      '</article>';

    return li;
  }

  const filters = { chain:'all', day:'all', format:'all' };

  function applyFilters(){
    return SCREENINGS.filter(function(s){
      if(filters.chain !== 'all' && s.chain !== filters.chain) return false;
      if(filters.day !== 'all' && dayKey(s.time) !== filters.day) return false;
      if(filters.format !== 'all'){
        if(s.total === null) return false;
        if(formatBucket(s.format) !== filters.format) return false;
      }
      return true;
    }).sort(function(a,b){
      if(a.occupied === null && b.occupied === null) return 0;
      if(a.occupied === null) return 1;
      if(b.occupied === null) return -1;
      return a.occupied - b.occupied;
    });
  }

  const list = document.getElementById('programme');
  const countEl = document.getElementById('listCount');

  function render(){
    const rows = applyFilters();
    list.innerHTML = '';
    rows.forEach(function(s, i){
      list.appendChild(buildCard(s, i));
    });

    countEl.innerHTML = rows.length
      ? '<b>' + rows.length + '</b> showtime' + (rows.length === 1 ? '' : 's') + ' on the bill'
      : 'No showtimes match — try another house';

    // settle handler: after entrance, unlock hover + warm the seats
    const cards = list.querySelectorAll('.screening');
    cards.forEach(function(card){
      if(REDUCE){
        card.classList.add('settled');
        return;
      }
      card.addEventListener('animationend', function onEnd(e){
        if(e.animationName === 'rise'){
          card.classList.add('settled');
          card.removeEventListener('animationend', onEnd);
        }
      });
    });
  }

  // wire filter pills
  document.querySelectorAll('.filter-group').forEach(function(group){
    const key = group.getAttribute('data-filter');
    group.querySelectorAll('.pill').forEach(function(pill){
      pill.addEventListener('click', function(){
        group.querySelectorAll('.pill').forEach(function(p){
          p.setAttribute('aria-pressed', 'false');
        });
        pill.setAttribute('aria-pressed', 'true');
        filters[key] = pill.getAttribute('data-value');
        render();
      });
    });
  });

  // last-checked = freshest reading
  const freshest = Math.min.apply(null, SCREENINGS.map(function(s){ return s.checkedMin; }));
  document.getElementById('lastChecked').textContent = 'Last checked ' + freshest + ' min ago';

  render();

  // orchestrated load
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      document.documentElement.classList.add('is-ready');
    });
  });
})();
</script>
