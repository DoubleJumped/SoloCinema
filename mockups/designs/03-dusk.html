<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoloCinema · Dusk</title>
<meta name="description" content="Tonight's emptiest theatres in Regina, under tonight's biggest sky.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#2B3A67; --sky-2:#6E5A8C; --sky-3:#B06E8C; --sky-4:#F2A65A; --sky-5:#F7E3C8;
    --ink:#22252B; --paper:#FBF6EE; --card:#FFFFFF;
    --wheat:#D9A441; --wheat-dark:#8A6318; --wheat-tint:#FBEFCF;
    --skyblue:#5E7FB8; --rose:#B06E8C; --muted:#6B6558;
    --disp:"Bricolage Grotesque", system-ui, sans-serif;
    --body:"Instrument Sans", system-ui, sans-serif;
    --mono:"Spline Sans Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--body); font-size:16px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--skyblue)}
  :focus-visible{ outline:3px solid var(--ink); outline-offset:2px; border-radius:2px; }

  /* ===================== HERO ===================== */
  .hero{
    position:relative; overflow:hidden;
    min-height:440px; height:55vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:clamp(24px,6vw,64px) 20px 120px;
    background:linear-gradient(180deg,
      var(--sky-1) 0%, var(--sky-2) 34%, var(--sky-3) 58%, var(--sky-4) 82%, var(--sky-5) 100%);
    animation:skyIn 1s ease both;
  }
  @keyframes skyIn{ from{opacity:0} to{opacity:1} }

  .star{ position:absolute; width:3px; height:3px; border-radius:50%;
    background:var(--paper); opacity:.85;
    box-shadow:0 0 6px 1px rgba(251,246,238,.7);
    animation:twinkle 4s ease-in-out infinite; }
  .star.s1{ top:14%; left:18%; }
  .star.s2{ top:22%; left:74%; animation-delay:1.3s; }
  .star.s3{ top:9%; left:52%; width:2px; height:2px; animation-delay:2.4s; }
  @keyframes twinkle{ 0%,100%{opacity:.35} 50%{opacity:.95} }

  /* half-set amber sun behind the horizon */
  .hero-sun{
    position:absolute; left:50%; bottom:0;
    width:170px; height:170px; margin-left:-85px; margin-bottom:-85px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 45%, #FFD79A 0%, var(--sky-4) 58%, rgba(242,166,90,0) 72%);
    z-index:1;
    animation:sunRise 1.1s cubic-bezier(.2,.7,.2,1) .15s both;
  }
  @keyframes sunRise{ from{ transform:translateY(28px); opacity:0 } to{ transform:translateY(0); opacity:1 } }

  .hero-content{ position:relative; z-index:3; text-align:center; max-width:820px;
    margin-bottom:auto; margin-top:auto; }
  .eyebrow{
    font-family:var(--body); font-weight:600;
    letter-spacing:.24em; text-transform:uppercase;
    font-size:clamp(.65rem,2.1vw,.82rem);
    color:#F3E7D6; text-shadow:0 1px 10px rgba(20,18,30,.45);
    margin:0 0 .7rem;
  }
  .hero-title{
    font-family:var(--disp); font-weight:800; letter-spacing:-.02em; line-height:.92;
    font-size:clamp(3rem,9vw,7rem); margin:0;
    color:#FFFBF4;
    text-shadow:0 2px 30px rgba(255,214,150,.55), 0 4px 60px rgba(43,58,103,.35);
  }
  .subtitle{
    font-family:var(--body); font-weight:500;
    font-size:clamp(1rem,2.6vw,1.35rem);
    color:#FDF4E7; text-shadow:0 1px 14px rgba(20,18,30,.5);
    margin:1rem auto 0; max-width:30ch;
  }

  /* the horizon + skyline sitting on it */
  .hero-horizon{ position:absolute; left:0; right:0; bottom:0; height:110px; z-index:2; }
  .hero-line{ position:absolute; left:0; right:0; bottom:0; height:2px; background:var(--ink); }
  .skyline{ position:absolute; left:0; right:0; bottom:0; height:100%; }
  .sil{ position:absolute; bottom:2px; transform:translateX(-50%);
    fill:var(--ink); animation:silIn .8s ease .5s both; }
  @keyframes silIn{ from{opacity:0; transform:translate(-50%,6px)} to{opacity:1; transform:translate(-50%,0)} }
  .sil-elevator{ left:9%; }
  .sil-fence-a{ left:24%; }
  .sil-drivein{ left:43%; }
  .sil-tower{ left:66%; }
  .sil-fence-b{ left:83%; }
  .sil-post{ left:93%; }
  @media (max-width:560px){
    .sil-drivein, .sil-fence-b{ display:none; }
    .sil-elevator{ left:14%; }
    .sil-tower{ left:60%; }
    .sil-post{ left:86%; }
  }

  /* ===================== TOOLBAR ===================== */
  .toolbar{
    max-width:1040px; margin:0 auto; padding:20px;
    display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px;
  }
  .count-line{ font-family:var(--body); color:var(--ink); font-weight:500; }
  .count-line b{ font-family:var(--mono); font-weight:700; color:var(--wheat-dark); }
  .filters{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .filters .sep{ width:1px; height:22px; background:rgba(34,37,43,.2); margin:0 2px; }
  .pill{
    font-family:var(--body); font-size:.86rem; font-weight:600;
    padding:6px 14px; border-radius:999px;
    border:1.5px solid var(--ink); background:transparent; color:var(--ink);
    cursor:pointer; line-height:1.3; transition:background .15s, color .15s;
  }
  .pill:hover{ background:rgba(34,37,43,.07); }
  .pill[aria-pressed="true"]{ background:var(--ink); color:var(--paper); }

  /* ===================== SCREENINGS ===================== */
  main{ max-width:1040px; margin:0 auto; padding:8px 20px 0; }
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:22px; }
  @media (max-width:720px){ .grid{ grid-template-columns:1fr; } }

  .card{
    position:relative; background:var(--card);
    border:1.5px solid var(--ink); border-radius:14px;
    box-shadow:4px 4px 0 var(--ink);
    padding:20px; display:flex; flex-direction:column; gap:12px;
    transition:box-shadow .18s ease, transform .18s ease;
    animation:cardUp .55s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes cardUp{ from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
  .card:hover{ box-shadow:6px 6px 0 var(--ink); transform:translate(-2px,-2px); }
  .card.is-empty{ background:var(--wheat-tint); }

  .card-top{ display:flex; align-items:center; gap:10px; }
  .time{ font-family:var(--mono); font-weight:700; font-size:1.02rem; color:var(--ink); }
  .tag{
    font-family:var(--body); font-weight:600; font-size:.68rem;
    text-transform:uppercase; letter-spacing:.1em;
    padding:2px 8px; border-radius:999px;
    border:1.5px solid var(--ink); color:var(--ink);
  }
  .movie{ font-family:var(--disp); font-weight:700; letter-spacing:-.01em;
    line-height:1.05; font-size:1.55rem; margin:0; }
  .meta{ font-family:var(--body); color:var(--muted); font-size:.92rem; margin-top:-4px; }

  .badge{
    position:absolute; top:-11px; right:14px;
    font-family:var(--body); font-weight:700; font-size:.7rem;
    letter-spacing:.08em; text-transform:uppercase;
    background:var(--wheat); color:var(--ink);
    border:1.5px solid var(--ink); border-radius:999px;
    padding:4px 11px; box-shadow:2px 2px 0 var(--ink);
  }

  .signature{ display:flex; align-items:center; gap:14px; margin-top:auto; padding-top:6px; }
  .meter-svg{ width:150px; height:auto; flex:0 0 auto; display:block; }
  .count{ display:flex; flex-direction:column; line-height:1; }
  .count .num{ font-family:var(--mono); font-weight:700; font-size:2rem; color:var(--wheat-dark); }
  .count .lbl{ font-family:var(--mono); font-weight:500; font-size:.72rem; color:var(--muted);
    letter-spacing:.04em; margin-top:3px; }
  .card.is-null .count .num{ color:#9a938a; }

  .microcopy{ font-family:var(--body); font-size:.82rem; color:var(--muted); font-style:italic; }
  .card.is-empty .microcopy{ color:var(--wheat-dark); font-style:normal; }

  .card-foot{ display:flex; align-items:center; justify-content:space-between;
    gap:12px; border-top:1.5px solid rgba(34,37,43,.14); padding-top:12px; }
  .tickets{ font-family:var(--body); font-weight:600; font-size:.92rem;
    color:var(--skyblue); text-decoration:none; white-space:nowrap; }
  .tickets:hover{ text-decoration:underline; }

  /* section divider horizon */
  .divider{ position:relative; max-width:1040px; margin:34px auto 26px; padding:0 20px; }
  .divider-line{ position:relative; height:2px; background:var(--ink); }
  .divider .divider-post{ position:absolute; bottom:2px; left:44px; fill:var(--ink); }
  .divider .divider-label{
    position:absolute; right:20px; top:50%; transform:translateY(-50%);
    background:var(--paper); padding:0 12px;
    font-family:var(--mono); font-weight:700; font-size:.78rem;
    letter-spacing:.16em; color:var(--wheat-dark);
  }
  .day-section[hidden]{ display:none; }
  .card[hidden]{ display:none; }

  /* ===================== FOOTER ===================== */
  footer{
    position:relative; margin-top:56px;
    background:var(--ink); color:var(--paper);
    border-top:2px solid var(--ink);
    padding:52px 20px 46px; text-align:center; overflow:hidden;
  }
  .fstar{ position:absolute; width:2px; height:2px; border-radius:50%;
    background:var(--paper); opacity:.7; }
  .fstar.a{ top:22%; left:16%; } .fstar.b{ top:38%; left:40%; }
  .fstar.c{ top:26%; left:66%; } .fstar.d{ top:52%; left:83%; }
  .fstar.e{ top:60%; left:28%; width:1.5px; height:1.5px; }
  .moon{ position:absolute; top:30px; right:38px;
    width:34px; height:34px; border-radius:50%;
    background:#EDE6D6; box-shadow:0 0 22px 4px rgba(237,230,214,.35);
    overflow:hidden; }
  .moon::after{ content:""; position:absolute; top:-6px; right:-8px;
    width:34px; height:34px; border-radius:50%; background:var(--ink); }
  .foot-text{ position:relative; z-index:1;
    font-family:var(--body); color:#C9C2B4; font-size:.9rem; max-width:44ch; margin:0 auto; }
  .foot-brand{ position:relative; z-index:1; font-family:var(--disp); font-weight:800;
    font-size:1.1rem; letter-spacing:-.01em; color:var(--paper); margin:0 0 8px; }

  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; transition:none !important; }
    .hero-sun{ transform:none; }
  }
</style>

<header class="hero">
  <span class="star s1"></span><span class="star s2"></span><span class="star s3"></span>
  <div class="hero-sun" aria-hidden="true"></div>

  <div class="hero-content">
    <p class="eyebrow">Regina · Land of Living Skies</p>
    <h1 class="hero-title">SoloCinema</h1>
    <p class="subtitle">Tonight's emptiest theatres, under tonight's biggest sky.</p>
  </div>

  <div class="hero-horizon" aria-hidden="true">
    <div class="skyline">
      <!-- grain elevator -->
      <svg class="sil sil-elevator" width="46" height="66" viewBox="0 0 46 66">
        <rect x="6" y="16" width="26" height="50"/>
        <rect x="32" y="26" width="9" height="40"/>
        <path d="M6 16 L19 6 L32 16 Z"/>
        <rect x="34" y="20" width="5" height="7"/>
      </svg>
      <!-- fence group A -->
      <svg class="sil sil-fence-a" width="86" height="22" viewBox="0 0 86 22">
        <rect x="4" y="4" width="3" height="18"/><rect x="24" y="6" width="3" height="16"/>
        <rect x="44" y="3" width="3" height="19"/><rect x="64" y="6" width="3" height="16"/>
        <rect x="80" y="5" width="3" height="17"/>
        <rect x="4" y="9" width="79" height="1.4"/><rect x="4" y="15" width="79" height="1.4"/>
      </svg>
      <!-- drive-in screen + two cars -->
      <svg class="sil sil-drivein" width="104" height="52" viewBox="0 0 104 52">
        <rect x="10" y="2" width="84" height="34" rx="2"/>
        <rect x="12" y="36" width="4" height="16"/><rect x="88" y="36" width="4" height="16"/>
        <path d="M20 52 q3-9 10-9 h10 q7 0 10 9 Z"/>
        <path d="M58 52 q3-9 10-9 h10 q7 0 10 9 Z"/>
      </svg>
      <!-- water tower -->
      <svg class="sil sil-tower" width="60" height="58" viewBox="0 0 60 58">
        <path d="M14 18 h32 l-4 12 h-24 Z"/>
        <path d="M14 18 q16-10 32 0" fill="none" stroke="#22252B" stroke-width="3"/>
        <path d="M17 30 L8 58" stroke="#22252B" stroke-width="3" fill="none"/>
        <path d="M43 30 L52 58" stroke="#22252B" stroke-width="3" fill="none"/>
        <path d="M27 30 L24 58" stroke="#22252B" stroke-width="3" fill="none"/>
        <path d="M33 30 L36 58" stroke="#22252B" stroke-width="3" fill="none"/>
        <rect x="12" y="42" width="36" height="2.4"/>
      </svg>
      <!-- fence group B -->
      <svg class="sil sil-fence-b" width="70" height="20" viewBox="0 0 70 20">
        <rect x="4" y="3" width="3" height="17"/><rect x="26" y="5" width="3" height="15"/>
        <rect x="48" y="3" width="3" height="17"/><rect x="66" y="5" width="3" height="15"/>
        <rect x="4" y="8" width="65" height="1.4"/><rect x="4" y="14" width="65" height="1.4"/>
      </svg>
      <!-- lone post -->
      <svg class="sil sil-post" width="14" height="30" viewBox="0 0 14 30">
        <rect x="5" y="2" width="4" height="28"/><rect x="2" y="8" width="10" height="2.6"/>
      </svg>
    </div>
    <div class="hero-line"></div>
  </div>
</header>

<div class="toolbar">
  <p class="count-line" id="countLine"><b>12</b> screenings · <b>2</b> with nobody in them yet</p>
  <div class="filters" role="group" aria-label="Filter screenings">
    <button class="pill" data-day="tonight" aria-pressed="false">Tonight</button>
    <button class="pill" data-day="tomorrow" aria-pressed="false">Tomorrow</button>
    <button class="pill" data-day="all" aria-pressed="true">All</button>
    <span class="sep" aria-hidden="true"></span>
    <button class="pill" data-chain="Landmark" aria-pressed="false">Landmark</button>
    <button class="pill" data-chain="Cineplex" aria-pressed="false">Cineplex</button>
    <button class="pill" data-chain="Other" aria-pressed="false">Other</button>
  </div>
</div>

<main id="app"></main>

<footer>
  <span class="fstar a"></span><span class="fstar b"></span><span class="fstar c"></span>
  <span class="fstar d"></span><span class="fstar e"></span>
  <div class="moon" aria-hidden="true"></div>
  <p class="foot-brand">SoloCinema</p>
  <p class="foot-text">Occupancy inferred from public seat maps · Regina, SK</p>
</footer>

<script>
const SCREENINGS = [
 {id:1,title:"The Quiet Frame",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T19:15",format:"Laser Ultra",occupied:0,total:84},
 {id:2,title:"Northern Vacancy",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-05T19:40",format:"Regular",occupied:0,total:112},
 {id:3,title:"Prairie Signal",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-05T20:20",format:"Regular",occupied:1,total:116},
 {id:4,title:"The Wascana Drift",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T20:45",format:"Recliner",occupied:2,total:74},
 {id:5,title:"Static Matinee",theater:"Rainbow Cinemas Golden Mile",chain:"Other",time:"2026-07-05T21:00",format:"Regular",occupied:3,total:180},
 {id:6,title:"Copper Sky",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-05T21:30",format:"3D",occupied:4,total:96},
 {id:7,title:"Midnight Elevator",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T22:10",format:"Laser Ultra",occupied:6,total:84},
 {id:8,title:"Hollow Harvest",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-05T22:30",format:"IMAX",occupied:9,total:210},
 {id:9,title:"Second Reel",theater:"Rainbow Cinemas Golden Mile",chain:"Other",time:"2026-07-06T13:30",format:"Regular",occupied:null,total:null},
 {id:10,title:"Dust & Neon",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-06T16:45",format:"VIP 19+",occupied:14,total:48},
 {id:11,title:"The Long Interval",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-06T19:00",format:"Recliner",occupied:22,total:74},
 {id:12,title:"Late Show North",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-06T21:50",format:"Regular",occupied:31,total:112}
];

const TONIGHT = "2026-07-05";
const fmtTime = iso => {
  const d = new Date(iso);
  let h = d.getHours(), m = d.getMinutes();
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,"0")} ${ap}`;
};
const dayOf = iso => iso.slice(0,10) === TONIGHT ? "tonight" : "tomorrow";

// sort ascending by occupied within day, nulls last
const byOccupancy = (a,b) => {
  if (a.occupied === null) return 1;
  if (b.occupied === null) return -1;
  return a.occupied - b.occupied;
};

function rays(cx, cy, r){
  let out = "";
  for (let i = 0; i < 8; i++){
    const a = i * Math.PI / 4;
    const x1 = cx + Math.cos(a) * (r + 3.5), y1 = cy + Math.sin(a) * (r + 3.5);
    const x2 = cx + Math.cos(a) * (r + 8.5), y2 = cy + Math.sin(a) * (r + 8.5);
    out += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#F2A65A" stroke-width="2" stroke-linecap="round"/>`;
  }
  return out;
}

// deterministic horizon meter: sun height above line encodes emptiness
function meterSVG(occupied, total, bg){
  const W = 210, H = 74, lineY = 50, r = 11;
  if (occupied === null){
    return `<svg class="meter-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="Seat map unavailable, low confidence">
      <circle cx="${W/2}" cy="28" r="${r}" fill="none" stroke="#b8b0a4" stroke-width="2"/>
      <line x1="6" y1="${lineY}" x2="${W-6}" y2="${lineY}" stroke="#b8b0a4" stroke-width="2" stroke-dasharray="7 7" stroke-linecap="round"/>
    </svg>`;
  }
  const emptiness = 1 - occupied / total;          // 1 = totally empty
  const top = 16, bottom = lineY + 8;               // sun-center travel range
  const cy = bottom - emptiness * (bottom - top);   // monotonic: emptier -> higher
  const glowOp = (0.16 + emptiness * 0.16).toFixed(2);
  const raysMarkup = occupied === 0 ? rays(W/2, cy, r) : "";
  return `<svg class="meter-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="${occupied} of ${total} seats taken">
    <circle cx="${W/2}" cy="${cy.toFixed(1)}" r="${r+7}" fill="#F2A65A" opacity="${glowOp}"/>
    ${raysMarkup}
    <circle cx="${W/2}" cy="${cy.toFixed(1)}" r="${r}" fill="#F2A65A"/>
    <rect x="0" y="${lineY}" width="${W}" height="${H-lineY}" fill="${bg}"/>
    <line x1="6" y1="${lineY}" x2="${W-6}" y2="${lineY}" stroke="#22252B" stroke-width="2" stroke-linecap="round"/>
  </svg>`;
}

function cardHTML(s, idx){
  const isEmpty = s.occupied === 0;
  const isNull = s.occupied === null;
  const bg = isEmpty ? "#FBEFCF" : "#FFFFFF";
  const day = dayOf(s.time);
  const tag = day === "tonight" ? "Tonight" : "Tomorrow";
  const numText = isNull ? "—" : String(s.occupied);
  const lbl = isNull ? "no data" : "seated";
  const micro = isNull
    ? `<p class="microcopy">seat map unavailable · low confidence</p>`
    : (isEmpty ? `<p class="microcopy">Nobody's booked. The projectionist runs it for you.</p>` : "");
  const badge = isEmpty ? `<span class="badge">Just You</span>` : "";
  const cls = `card${isEmpty ? " is-empty" : ""}${isNull ? " is-null" : ""}`;
  return `<article class="${cls}" data-chain="${s.chain}" data-day="${day}" style="animation-delay:${(idx*60)}ms">
    ${badge}
    <div class="card-top">
      <span class="time">${fmtTime(s.time)}</span>
      <span class="tag">${tag}</span>
    </div>
    <h3 class="movie">${s.title}</h3>
    <p class="meta">${s.theater} · ${s.format}</p>
    <div class="signature">
      ${meterSVG(s.occupied, s.total, bg)}
      <div class="count"><span class="num">${numText}</span><span class="lbl">${lbl}</span></div>
    </div>
    <div class="card-foot">
      ${micro || `<span class="microcopy" style="visibility:hidden">.</span>`}
      <a class="tickets" href="#">Get tickets &rarr;</a>
    </div>
  </article>`;
}

function render(){
  const tonight = SCREENINGS.filter(s => dayOf(s.time) === "tonight").sort(byOccupancy);
  const tomorrow = SCREENINGS.filter(s => dayOf(s.time) === "tomorrow").sort(byOccupancy);
  let idx = 0;
  const section = (label, list, withDivider) => {
    const divider = withDivider ? `
      <div class="divider day-divider" data-day="tomorrow">
        <div class="divider-line">
          <svg class="divider-post" width="14" height="26" viewBox="0 0 14 26"><rect x="5" y="2" width="4" height="24"/><rect x="2" y="7" width="10" height="2.4"/></svg>
        </div>
        <span class="divider-label">${label}</span>
      </div>` : "";
    const cards = list.map(s => cardHTML(s, idx++)).join("");
    const dayKey = withDivider ? "tomorrow" : "tonight";
    return `${divider}<section class="day-section" data-day="${dayKey}"><div class="grid">${cards}</div></section>`;
  };
  document.getElementById("app").innerHTML =
    section("Tonight", tonight, false) + section("Tomorrow", tomorrow, true);
}
render();

// ---- filtering ----
let dayFilter = "all", chainFilter = null;
function applyFilters(){
  document.querySelectorAll(".card").forEach(c => {
    const okDay = dayFilter === "all" || c.dataset.day === dayFilter;
    const okChain = !chainFilter || c.dataset.chain === chainFilter;
    c.hidden = !(okDay && okChain);
  });
  document.querySelectorAll(".day-section").forEach(sec => {
    const visible = sec.querySelectorAll(".card:not([hidden])").length;
    sec.hidden = visible === 0;
    const div = document.querySelector(`.day-divider[data-day="${sec.dataset.day}"]`);
    if (div) div.style.display = visible === 0 ? "none" : "";
  });
}

document.querySelectorAll(".pill[data-day]").forEach(btn => {
  btn.addEventListener("click", () => {
    dayFilter = btn.dataset.day;
    document.querySelectorAll(".pill[data-day]").forEach(b =>
      b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
    applyFilters();
  });
});
document.querySelectorAll(".pill[data-chain]").forEach(btn => {
  btn.addEventListener("click", () => {
    const c = btn.dataset.chain;
    chainFilter = (chainFilter === c) ? null : c;
    document.querySelectorAll(".pill[data-chain]").forEach(b =>
      b.setAttribute("aria-pressed", b.dataset.chain === chainFilter ? "true" : "false"));
    applyFilters();
  });
});
</script>
