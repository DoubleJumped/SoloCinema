<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoloCinema — The Auditorium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --room:#050607;
    --velvet:#2A2226;
    --glow:#9FE8DF;
    --amber:#E8A54A;
    --nodata:rgba(152,166,164,0.25);
    --room-text:#98A6A4;
    --ink:#0d1817;
    --ink-soft:#33413f;
    --ring:#EAF4F4;
    --panel-lo:#C9DEDC;
    --panel-hi:#F6FBFA;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(120% 90% at 50% -8%, rgba(190,220,215,0.10), rgba(190,220,215,0.03) 34%, transparent 60%),
      radial-gradient(140% 120% at 50% 40%, rgba(20,16,18,0) 40%, #030304 100%),
      var(--room);
    color:var(--room-text);
    font-family:"Space Mono",monospace;
    min-height:100%;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}

  /* ---- projector beam + dust ---- */
  .beam{
    position:fixed; left:50%; bottom:0; width:min(680px,84vw); height:76vh;
    transform:translateX(-50%);
    background:linear-gradient(to top, rgba(220,240,236,0.055), rgba(220,240,236,0.02) 46%, transparent 80%);
    clip-path:polygon(50% 100%, 8% 0, 92% 0);
    pointer-events:none; z-index:0; filter:blur(2px);
  }
  .mote{
    position:fixed; width:3px; height:3px; border-radius:50%;
    background:rgba(220,240,236,0.6); filter:blur(1.4px);
    pointer-events:none; z-index:1; opacity:0;
  }
  .mote.m1{left:46%; bottom:20%; animation:drift1 22s linear infinite}
  .mote.m2{left:54%; bottom:34%; animation:drift2 27s linear infinite 4s}
  .mote.m3{left:49%; bottom:12%; animation:drift1 19s linear infinite 9s}
  @keyframes drift1{
    0%{transform:translate(0,0);opacity:0}
    12%{opacity:.5} 88%{opacity:.4}
    100%{transform:translate(26px,-240px);opacity:0}
  }
  @keyframes drift2{
    0%{transform:translate(0,0);opacity:0}
    12%{opacity:.45} 88%{opacity:.35}
    100%{transform:translate(-32px,-300px);opacity:0}
  }

  /* ---- corners ---- */
  .corner{
    position:fixed; z-index:6; font-size:11px; letter-spacing:.14em;
    color:var(--room-text); text-transform:uppercase; padding:14px 18px;
  }
  .corner.tl{top:0;left:0}
  .corner.tr{top:0;right:0;text-align:right}
  .corner .dim{color:rgba(152,166,164,0.55)}

  .stage{position:relative; z-index:3; padding:56px 20px 26px; max-width:1120px; margin:0 auto}

  /* ---- THE SCREEN ---- */
  .screen-wrap{
    perspective:1500px; display:flex; flex-direction:column; align-items:center;
    margin-bottom:10px;
  }
  .screen{
    position:relative; width:min(920px,92vw); min-height:38vh;
    border-radius:6px;
    background:
      linear-gradient(180deg, var(--panel-hi) 0%, #E4F1EF 46%, var(--panel-lo) 100%),
      radial-gradient(120% 80% at 50% 8%, rgba(255,255,255,0.9), transparent 60%);
    transform:rotateX(4deg);
    transform-origin:center bottom;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.5) inset,
      0 44px 120px -30px rgba(190,220,215,0.42),
      0 0 160px 10px rgba(190,220,215,0.14),
      0 60px 90px -50px rgba(0,0,0,0.7);
    padding:clamp(22px,3.4vw,40px) clamp(24px,4vw,54px);
    color:var(--ink);
    overflow:hidden;
  }
  .screen::after{ /* faint scanline / projected sheen */
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%);
    opacity:.5; mix-blend-mode:screen;
  }
  .screen-inner{position:relative; z-index:2; transition:opacity .2s ease; display:flex; flex-direction:column; gap:clamp(8px,1.4vw,14px)}
  .screen.swap .screen-inner{opacity:0; transition:opacity .15s ease}

  .eyebrow{
    font-family:"Archivo",sans-serif; font-weight:700; font-size:12px;
    letter-spacing:.42em; text-transform:uppercase; color:var(--ink-soft);
  }
  .title{
    font-family:"Archivo",sans-serif; font-weight:800;
    font-size:clamp(34px,6.4vw,68px); line-height:.96; letter-spacing:-.01em;
    text-transform:uppercase; color:var(--ink); font-stretch:125%;
    max-width:14ch;
  }
  .meta{
    font-family:"Archivo",sans-serif; font-weight:600; font-size:clamp(12px,1.7vw,16px);
    letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);
  }
  .meta .dot{opacity:.5; margin:0 .5em}
  .stat{
    font-family:"Archivo",sans-serif; font-weight:800; color:var(--ink);
    font-size:clamp(22px,3.6vw,40px); letter-spacing:-.005em; line-height:1;
    margin-top:2px;
  }
  .stat .num{font-size:1.18em}
  .stat.unknown{font-size:clamp(17px,2.4vw,26px); font-weight:700; color:var(--ink-soft); text-transform:none; letter-spacing:0}
  .fresh{
    font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.04em;
    color:var(--ink-soft);
  }
  .reserve{
    align-self:flex-start; margin-top:6px;
    display:inline-block; text-decoration:none;
    background:var(--ink); color:#EAF4F4;
    font-family:"Archivo",sans-serif; font-weight:700; font-size:13px;
    letter-spacing:.16em; text-transform:uppercase;
    padding:13px 22px; border-radius:4px;
    box-shadow:0 6px 20px -8px rgba(0,0,0,0.5);
    transition:transform .15s ease, background .15s ease;
  }
  .reserve:hover{transform:translateY(-1px); background:#0a1211}
  .reserve:focus-visible{outline:3px solid rgba(13,24,23,0.55); outline-offset:2px}

  /* floor reflection */
  .reflection{
    width:min(720px,80vw); height:26px; margin-top:4px;
    background:linear-gradient(180deg, rgba(190,220,215,0.20), transparent 80%);
    filter:blur(5px); border-radius:50%;
  }

  .maskstrip{
    text-align:center; font-size:11.5px; letter-spacing:.12em; text-transform:uppercase;
    color:rgba(152,166,164,0.7); margin:16px auto 30px; max-width:640px;
  }
  .maskstrip .sp{color:var(--glow); opacity:.85}

  /* ---- THE HOUSE ---- */
  .house{display:flex; flex-direction:column; gap:clamp(20px,3.2vw,40px); align-items:center; margin-bottom:60px}
  .row{
    display:flex; align-items:flex-start; gap:18px; width:100%;
    justify-content:center; position:relative;
  }
  .row-label{
    position:absolute; left:0; top:8px; width:150px;
    font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:rgba(152,166,164,0.7); text-align:right; padding-right:18px;
    line-height:1.4;
  }
  .row-label b{display:block; color:var(--room-text); font-weight:700; font-size:14px}
  .seats{display:flex; gap:clamp(10px,2vw,26px); justify-content:center; padding:6px 0}

  /* depth per row */
  .row.rA .seats{transform:scale(.94)}
  .row.rC .seats{transform:scale(1.06)}

  .seat{
    --pop:0px; --sc:1; --haloOp:0; --haloBlur:8px;
    position:relative; appearance:none; border:0; background:none; cursor:pointer;
    padding:0; width:clamp(64px,8.4vw,84px);
    display:flex; flex-direction:column; align-items:center; gap:6px;
    transform:rotate(var(--rot)) translateY(calc(var(--ty) + var(--pop))) scale(var(--sc));
    transition:transform .2s cubic-bezier(.2,.7,.3,1), filter .2s ease;
    color:var(--room-text);
  }
  .seat svg{width:100%; height:auto; display:block; overflow:visible}
  .seat .back,.seat .cushion{stroke:rgba(255,255,255,0.06); stroke-width:1}
  .seat .arm{stroke:rgba(255,255,255,0.05); stroke-width:1}
  .seat .back{fill:var(--back)}
  .seat .cushion{fill:var(--cushion)}
  .seat .arm{fill:var(--arm)}
  /* halo */
  .seat::after{
    content:""; position:absolute; left:50%; top:38%; width:120%; height:96%;
    transform:translate(-50%,-50%); border-radius:50%;
    background:radial-gradient(closest-side, var(--halo), transparent 74%);
    filter:blur(var(--haloBlur)); opacity:var(--haloOp);
    z-index:-1; transition:opacity .3s ease;
  }
  .seat.empty::after{animation:breathe 4s ease-in-out infinite}
  @keyframes breathe{
    0%,100%{opacity:calc(var(--haloOp) * .78); transform:translate(-50%,-50%) scale(.97)}
    50%{opacity:var(--haloOp); transform:translate(-50%,-50%) scale(1.05)}
  }

  .seat.ghost .back,.seat.ghost .cushion{fill:transparent; stroke:var(--nodata); stroke-width:1.3}
  .seat.ghost .arm{fill:transparent; stroke:var(--nodata); stroke-width:1.3}

  .spark{
    position:absolute; top:-14px; left:50%; transform:translateX(-50%);
    color:var(--glow); font-size:13px; text-shadow:0 0 8px rgba(159,232,223,0.8);
    animation:floaty 3.6s ease-in-out infinite;
  }
  @keyframes floaty{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,-4px)}}

  .cap{
    display:flex; flex-direction:column; align-items:center; gap:1px;
    max-width:100%; width:100%;
  }
  .cap-time{font-size:11px; font-weight:700; color:rgba(152,166,164,0.85); letter-spacing:.04em}
  .cap-title{
    font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
    color:rgba(152,166,164,0.55); max-width:100%; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }

  .seat:hover{--pop:-4px}
  .seat:hover .cap-time{color:#c3d1cf}
  .seat:hover .cap-title{color:#a9b7b5}
  .seat:hover{--haloOp:calc(var(--g,0) * .95 + .12)}

  .seat[aria-pressed="true"]{--pop:-8px; --sc:1.06}
  .seat[aria-pressed="true"] svg{filter:drop-shadow(0 0 0 var(--ring))}
  .seat[aria-pressed="true"]::before{
    content:""; position:absolute; left:50%; top:38%; width:118%; height:112%;
    transform:translate(-50%,-50%); border-radius:14px;
    box-shadow:0 0 0 2px var(--ring), 0 0 22px -4px rgba(234,244,244,0.5);
    z-index:-1;
  }
  .seat[aria-pressed="true"] .cap-time{color:#eaf4f4}
  .seat[aria-pressed="true"] .cap-title{color:#c9d5d3}

  .seat:focus{outline:none}
  .seat:focus-visible{outline:none}
  .seat:focus-visible svg{filter:drop-shadow(0 0 0.5px #eaf4f4)}
  .seat:focus-visible .cap{outline:2px dashed rgba(234,244,244,0.85); outline-offset:3px; border-radius:4px}

  /* ---- legend ---- */
  .legend{
    position:fixed; right:16px; bottom:14px; z-index:6;
    font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:rgba(152,166,164,0.75); display:flex; flex-direction:column; gap:6px;
    background:rgba(6,8,9,0.55); padding:12px 14px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.05); backdrop-filter:blur(3px);
  }
  .legend .lg-title{color:rgba(152,166,164,0.5); font-size:9px; letter-spacing:.16em; margin-bottom:2px}
  .legend .lg{display:flex; align-items:center; gap:8px}
  .legend .sw{width:12px; height:12px; border-radius:3px; flex:0 0 auto; border:1px solid rgba(255,255,255,0.06)}
  .sw.s0{background:var(--glow); box-shadow:0 0 8px 1px rgba(159,232,223,0.7)}
  .sw.s1{background:#5f9a93}
  .sw.s2{background:#3c5250}
  .sw.s3{background:#4a3a2b; box-shadow:0 0 6px -1px rgba(232,165,74,0.35)}
  .sw.s4{background:transparent; border:1px dashed var(--nodata)}

  @media (max-width:900px){
    .row-label{position:static; width:auto; text-align:center; padding:0; margin-bottom:2px}
    .row{flex-direction:column; align-items:center; gap:8px}
  }
  @media (max-width:760px){
    .stage{padding-top:48px}
    .title{max-width:100%}
    .screen{min-height:auto}
    .row.rA .seats,.row.rC .seats{transform:none}
    .legend{position:static; margin:10px auto 30px; align-self:center; flex-direction:row; flex-wrap:wrap; justify-content:center; max-width:340px}
    .legend .lg-title{width:100%; text-align:center}
    .seat{--rot:0deg !important; --ty:0px !important}
  }
  @media (max-width:420px){
    .seats{gap:8px}
    .seat{width:clamp(58px,20vw,72px)}
    .cap-title{font-size:8.5px}
  }

  @media (prefers-reduced-motion:reduce){
    .mote{display:none}
    .seat.empty::after{animation:none; opacity:var(--haloOp)}
    .spark{animation:none}
    .screen.swap .screen-inner,.screen-inner{transition:none}
    .seat,.reserve{transition:none}
  }
</style>

<div class="beam" aria-hidden="true"></div>
<div class="mote m1" aria-hidden="true"></div>
<div class="mote m2" aria-hidden="true"></div>
<div class="mote m3" aria-hidden="true"></div>

<div class="corner tl">SoloCinema <span class="dim">— Regina</span></div>
<div class="corner tr">12 Showings <span class="dim">· 2 Private</span></div>

<main class="stage">
  <div class="screen-wrap">
    <section class="screen" id="screen" aria-live="polite" aria-atomic="true" aria-label="Selected screening">
      <div class="screen-inner" id="screenInner"><!-- filled by JS --></div>
    </section>
  </div>
  <div class="reflection" aria-hidden="true"></div>

  <p class="maskstrip">each seat is a screening — brighter means emptier <span class="sp">✦</span> enter / click to select</p>

  <div class="house" id="house" role="group" aria-label="Auditorium seat map — choose a screening"><!-- rows by JS --></div>
</main>

<div class="legend" aria-hidden="true">
  <div class="lg-title">Glow = emptiness</div>
  <div class="lg"><span class="sw s0"></span> Private</div>
  <div class="lg"><span class="sw s1"></span> Near empty</div>
  <div class="lg"><span class="sw s2"></span> Quiet</div>
  <div class="lg"><span class="sw s3"></span> Busy</div>
  <div class="lg"><span class="sw s4"></span> No data</div>
</div>

<script>
const SCREENINGS = [
 {id:1,title:"The Quiet Frame",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T19:15",format:"Laser Ultra",occupied:0,total:84,confidence:"high",checkedMin:12},
 {id:2,title:"Northern Vacancy",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-05T19:40",format:"Regular",occupied:0,total:112,confidence:"medium",checkedMin:23},
 {id:3,title:"Prairie Signal",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-05T20:20",format:"Regular",occupied:1,total:116,confidence:"high",checkedMin:8},
 {id:4,title:"The Wascana Drift",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T20:45",format:"Recliner",occupied:2,total:74,confidence:"high",checkedMin:12},
 {id:5,title:"Static Matinee",theater:"Rainbow Cinemas Golden Mile",chain:"Other",time:"2026-07-05T21:00",format:"Regular",occupied:3,total:180,confidence:"low",checkedMin:41},
 {id:6,title:"Copper Sky",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-05T21:30",format:"3D",occupied:4,total:96,confidence:"medium",checkedMin:8},
 {id:7,title:"Midnight Elevator",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-05T22:10",format:"Laser Ultra",occupied:6,total:84,confidence:"high",checkedMin:12},
 {id:8,title:"Hollow Harvest",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-05T22:30",format:"IMAX",occupied:9,total:210,confidence:"high",checkedMin:23},
 {id:9,title:"Second Reel",theater:"Rainbow Cinemas Golden Mile",chain:"Other",time:"2026-07-06T13:30",format:"Regular",occupied:null,total:null,confidence:"low",checkedMin:41},
 {id:10,title:"Dust & Neon",theater:"Cineplex Cinemas Normanview",chain:"Cineplex",time:"2026-07-06T16:45",format:"VIP 19+",occupied:14,total:48,confidence:"medium",checkedMin:8},
 {id:11,title:"The Long Interval",theater:"Landmark Cinemas 8 Regina",chain:"Landmark",time:"2026-07-06T19:00",format:"Recliner",occupied:22,total:74,confidence:"high",checkedMin:12},
 {id:12,title:"Late Show North",theater:"Cineplex Odeon Southland Mall",chain:"Cineplex",time:"2026-07-06T21:50",format:"Regular",occupied:31,total:112}
];

const byId = id => SCREENINGS.find(s=>s.id===id);
const ROWS = [
  {label:"A", hint:"TONIGHT · EARLY", ids:[1,2,3,4]},
  {label:"B", hint:"TONIGHT · LATE",  ids:[5,6,7,8]},
  {label:"C", hint:"TOMORROW",        ids:[9,10,11,12]}
];
const ARC_ROT = ["-8deg","-3deg","3deg","8deg"];
const ARC_TY  = ["14px","0px","0px","14px"];

/* ---- colour helpers ---- */
const VELVET=[42,34,38], TEAL=[159,232,223], AMBER=[232,165,74];
function mix(a,b,t){t=Math.max(0,Math.min(1,t));return `rgb(${a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(',')})`;}

// visual encoding: halo brightness is monotonic NON-INCREASING as occupancy rises.
// cushT tints the cushion; haloOp is the glow strength (the emptiness signal).
function visual(o){
  if(o===null) return {type:'ghost'};
  if(o===0)    return {type:'empty', target:TEAL,  cushT:1,    haloOp:1.0,  haloA:0.85};
  if(o>=10)    return {type:'busy',  target:AMBER, cushT:0.16, haloOp:0.03, haloA:0.12}; // near-dark, amber tint, dimmer than any quiet seat
  const t = Math.max(0.06, 0.6*Math.pow(0.72,o)); // 1..9, strictly decreasing then floored
  return {type:'quiet', target:TEAL, cushT:t, haloOp:t*0.92, haloA:t*0.75};
}

function fmtSlide(iso){
  const d=new Date(iso);
  const today = iso.slice(0,10)==="2026-07-05";
  let h=d.getHours(); const m=d.getMinutes();
  const ap=h>=12?'PM':'AM'; let hh=h%12; if(hh===0)hh=12;
  return (today?'Tonight ':'Tomorrow ')+hh+':'+String(m).padStart(2,'0')+' '+ap;
}
function fmtCap(iso){
  const d=new Date(iso); let h=d.getHours(); let hh=h%12; if(hh===0)hh=12;
  return hh+':'+String(d.getMinutes()).padStart(2,'0');
}
function cap2(t){ const w=t.replace(/^The\s+/i,'').split(' '); let n=2; if(w[1]&&w[1].length<=2&&w[2]) n=3; return w.slice(0,n).join(' '); }

const SEAT_SVG = `
<svg viewBox="0 0 84 78" role="presentation" aria-hidden="true">
  <rect class="arm" x="4"  y="34" width="12" height="34" rx="6"/>
  <rect class="arm" x="68" y="34" width="12" height="34" rx="6"/>
  <rect class="back" x="12" y="4" width="60" height="42" rx="12"/>
  <rect class="cushion" x="16" y="42" width="52" height="24" rx="8"/>
</svg>`;

/* ---- build seats ---- */
const house = document.getElementById('house');
const seatEls = []; // [r][c]
ROWS.forEach((row,r)=>{
  const rowEl=document.createElement('div');
  rowEl.className='row r'+row.label;
  const lab=document.createElement('div');
  lab.className='row-label';
  lab.innerHTML=`<b>${row.label}</b>${row.hint}`;
  const seatsEl=document.createElement('div');
  seatsEl.className='seats';
  const rowArr=[];
  row.ids.forEach((id,c)=>{
    const s=byId(id);
    const v=visual(s.occupied);
    const btn=document.createElement('button');
    btn.className='seat '+v.type;
    btn.type='button';
    btn.dataset.id=id; btn.dataset.r=r; btn.dataset.c=c;
    btn.setAttribute('aria-pressed','false');
    // arc
    btn.style.setProperty('--rot',ARC_ROT[c]);
    btn.style.setProperty('--ty',ARC_TY[c]);
    // colours
    if(v.type==='ghost'){
      btn.style.setProperty('--halo','transparent');
      btn.style.setProperty('--haloOp','0');
      btn.style.setProperty('--g','0');
    }else{
      btn.style.setProperty('--cushion',mix(VELVET,v.target,v.cushT));
      btn.style.setProperty('--back',mix(VELVET,v.target,v.cushT*0.82));
      btn.style.setProperty('--arm',mix(VELVET,[70,60,64],0.5));
      const hc=v.target;
      btn.style.setProperty('--halo',`rgba(${hc[0]},${hc[1]},${hc[2]},${v.haloA})`);
      btn.style.setProperty('--haloOp',String(v.haloOp));
      btn.style.setProperty('--g',String(v.haloOp));
    }
    // aria-label
    const timeTxt=fmtSlide(s.time).toLowerCase();
    let occTxt = s.occupied===null ? 'occupancy unknown, seat map unavailable'
                 : `${s.occupied} of ${s.total} seats taken`;
    btn.setAttribute('aria-label',`${s.title}, ${s.theater}, ${timeTxt}, ${occTxt}`);
    // contents
    btn.innerHTML = SEAT_SVG
      + (v.type==='empty'?'<span class="spark" aria-hidden="true">✦</span>':'')
      + `<span class="cap"><span class="cap-time">${fmtCap(s.time)}</span><span class="cap-title">${cap2(s.title)}</span></span>`;
    btn.addEventListener('click',()=>select(id,btn,false));
    seatsEl.appendChild(btn);
    rowArr.push(btn);
  });
  rowEl.appendChild(lab);
  rowEl.appendChild(seatsEl);
  house.appendChild(rowEl);
  seatEls.push(rowArr);
});

/* ---- screen slide ---- */
const screen=document.getElementById('screen');
const inner=document.getElementById('screenInner');
const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
let currentId=null;

function slideHTML(s){
  const empty = s.total!==null ? s.total - s.occupied : null;
  const conf = s.confidence ? `${s.confidence} confidence` : 'unverified';
  const fresh = s.checkedMin!=null ? `checked ${s.checkedMin} min ago` : 'not yet checked';
  let statBlock;
  if(s.occupied===null){
    statBlock = `<div class="stat unknown">Seat map unavailable — occupancy unknown.</div>`;
  }else{
    statBlock = `<div class="stat"><span class="num">${s.total}</span> seats. <span class="num">${s.occupied}</span> ${s.occupied===1?'person':'people'}.</div>`;
  }
  return `
    <div class="eyebrow">Now Selecting</div>
    <h1 class="title">${s.title}</h1>
    <div class="meta">${s.theater}<span class="dot">·</span>${s.format}<span class="dot">·</span>${fmtSlide(s.time)}</div>
    ${statBlock}
    <div class="fresh">${conf} · ${fresh}</div>
    <a class="reserve" href="#">Reserve this room</a>`;
}

let swapTimer=null;
function renderSlide(s){
  inner.innerHTML=slideHTML(s);
}
function updateScreen(s){
  if(reduce){ renderSlide(s); return; }
  screen.classList.add('swap');
  clearTimeout(swapTimer);
  swapTimer=setTimeout(()=>{
    renderSlide(s);
    // force reflow then fade in
    void inner.offsetWidth;
    screen.classList.remove('swap');
  },150);
}

function select(id, btn, focusIt){
  if(id===currentId){ if(focusIt&&btn) btn.focus(); return; }
  currentId=id;
  seatEls.flat().forEach(b=>b.setAttribute('aria-pressed', b.dataset.id==String(id)?'true':'false'));
  updateScreen(byId(id));
  if(focusIt&&btn) btn.focus();
}

/* ---- keyboard grid nav ---- */
house.addEventListener('keydown',e=>{
  const keys=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
  if(!keys.includes(e.key)) return;
  const active=document.activeElement;
  let r,c;
  if(active && active.classList.contains('seat')){
    r=+active.dataset.r; c=+active.dataset.c;
  }else{
    const cur=seatEls.flat().find(b=>b.dataset.id==String(currentId));
    r=+cur.dataset.r; c=+cur.dataset.c;
  }
  e.preventDefault();
  if(e.key==='ArrowLeft')  c=Math.max(0,c-1);
  if(e.key==='ArrowRight') c=Math.min(3,c+1);
  if(e.key==='ArrowUp')    r=Math.max(0,r-1);
  if(e.key==='ArrowDown')  r=Math.min(2,r+1);
  const target=seatEls[r][c];
  select(+target.dataset.id, target, true);
});

/* ---- init: emptiest pre-selected (The Quiet Frame, id 1) ---- */
renderSlide(byId(1));
currentId=1;
seatEls.flat().find(b=>b.dataset.id==='1').setAttribute('aria-pressed','true');
</script>
