<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoloCinema — The Reel</title>
<meta name="description" content="Every showtime in Regina laid out on a strip of 35mm film. Scrub the reel; the emptiest theaters glow brightest.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">

<style>
  :root{
    --table:#E8E6E0;
    --table-lit:#F4F3EF;
    --base:#3B3630;
    --neg:#C46A32;
    --neg-glow:#E07B39;
    --empty:#FFF9EE;
    --dense:#241E19;
    --ink:#1F1B18;
    --edge:#E8D9A8;
    --green:#2E7D5B;
    --pencil:#F4F1E8;

    --mono:"IBM Plex Mono", ui-monospace, monospace;
    --disp:"Anton", Impact, sans-serif;
    --read:"Archivo", system-ui, sans-serif;

    --cell-w:320px;
    --frame-w:296px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{height:100%;}
  body{
    min-height:100%;
    font-family:var(--read);
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% 46%, var(--table-lit) 0%, var(--table) 60%, #DEDCD5 100%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  /* ---------- Table chrome (labels above / below strip) ---------- */
  .bench{
    position:fixed;
    top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    gap:16px;
    padding:16px 20px;
    font-family:var(--mono);
    font-size:11px;letter-spacing:.06em;text-transform:lowercase;
    color:var(--ink);
    pointer-events:none;
    z-index:20;
  }
  .bench .r{text-align:right;text-transform:none;opacity:.72;}
  .bench .l b{font-weight:600;text-transform:uppercase;letter-spacing:.12em;}
  .bench .l span{display:block;opacity:.6;margin-top:3px;}

  /* ---------- Scrub viewport ---------- */
  .stage{
    position:fixed;
    inset:0;
    display:flex;align-items:center;
  }
  .viewport{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x proximity;
    scroll-padding-inline:50%;
    cursor:grab;
    -webkit-overflow-scrolling:touch;
  }
  .viewport.dragging{cursor:grabbing;}
  /* thin styled scrollbar, kept visible */
  .viewport{scrollbar-width:thin;scrollbar-color:rgba(31,27,24,.35) transparent;}
  .viewport::-webkit-scrollbar{height:8px;}
  .viewport::-webkit-scrollbar-track{background:transparent;}
  .viewport::-webkit-scrollbar-thumb{
    background:rgba(31,27,24,.3);border-radius:20px;
    border:2px solid transparent;background-clip:content-box;
  }
  .viewport::-webkit-scrollbar-thumb:hover{background:rgba(31,27,24,.5);background-clip:content-box;}

  /* ---------- The reel / film strip ---------- */
  .reel{
    display:flex;
    flex-direction:row;
    align-items:stretch;
    height:min(46vh,420px);
    padding-inline:calc(50vw - (var(--cell-w) / 2));
    width:max-content;
    filter:drop-shadow(0 22px 30px rgba(31,27,24,.22));
  }

  .cell{
    flex:0 0 var(--cell-w);
    width:var(--cell-w);
    background:var(--base);
    display:flex;
    flex-direction:column;
    position:relative;
    border-top:2px solid rgba(196,106,50,.55);
    border-bottom:2px solid rgba(196,106,50,.55);
    box-shadow:inset 0 3px 8px rgba(0,0,0,.35), inset 0 -3px 8px rgba(0,0,0,.35);
    scroll-snap-align:center;
  }
  /* negative orange edge glow along the film base */
  .cell::before,.cell::after{
    content:"";position:absolute;left:0;right:0;height:5px;pointer-events:none;z-index:2;
    background:linear-gradient(var(--dir,180deg), rgba(224,123,57,.45), transparent);
  }
  .cell::before{top:0;}
  .cell::after{bottom:0;--dir:0deg;}

  /* Sprocket rows */
  .spr{
    display:flex;
    flex-direction:row;
    justify-content:space-around;
    align-items:center;
    padding:7px 12px;
    flex:0 0 auto;
  }
  .hole{
    width:14px;height:18px;border-radius:3px;
    background:
      radial-gradient(120% 120% at 50% 40%, var(--table-lit), var(--table) 70%, #DEDCD5);
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,.5),
      inset 0 -1px 1px rgba(255,255,255,.5),
      0 0 4px rgba(224,123,57,.25);
  }

  /* Edge-print lines */
  .edge{
    font-family:var(--mono);
    font-size:8.5px;
    letter-spacing:.14em;
    line-height:1;
    color:var(--edge);
    text-transform:uppercase;
    padding:0 12px 3px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
    opacity:.82;
    flex:0 0 auto;
    user-select:none;
  }
  .edge.bot{padding:3px 12px 0;display:flex;justify-content:space-between;gap:8px;}
  .edge.bot .num{color:var(--edge);}
  .edge.bot .num b{color:var(--neg-glow);font-weight:500;}

  .stack{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    min-width:0;
    min-height:0;
  }
  .mid{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:0 10px;
    position:relative;
    min-height:0;
  }

  /* ---------- The frame (screening) ---------- */
  .frame{
    appearance:none;
    -webkit-appearance:none;
    border:0;
    margin:0;
    width:100%;
    aspect-ratio:4/3;
    border-radius:2px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    text-align:left;
    color:inherit;
    font-family:inherit;
    padding:14px 15px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap:8px;
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
    outline:0;
    box-shadow:0 0 0 1px rgba(224,123,57,.35), inset 0 0 0 1px rgba(0,0,0,.25);
  }
  .frame:hover{transform:translateY(-3px);}
  .frame:focus-visible{
    box-shadow:0 0 0 3px var(--ink), 0 0 0 5px rgba(224,123,57,.55);
    z-index:5;
  }

  .frame .ftitle{
    font-family:var(--disp);
    font-weight:400;
    text-transform:uppercase;
    line-height:.9;
    font-size:29px;
    letter-spacing:.01em;
    margin:0;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .frame .fmeta{
    font-family:var(--mono);
    font-size:9.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin:0;
    opacity:.9;
  }

  /* Exposure encoding — monotonic light -> dark with occupancy */
  .exp-empty{
    background:radial-gradient(120% 130% at 50% 30%, #FFFFFF, var(--empty) 55%, #FBEFD7 100%);
    color:var(--ink);
    box-shadow:0 0 34px 2px rgba(255,246,224,.9), 0 0 0 1px rgba(224,123,57,.4), 0 6px 20px rgba(31,27,24,.15);
  }
  .exp-light{
    background:linear-gradient(160deg, #FBEED7 0%, #F6E1C0 60%, #EED4AC 100%);
    color:var(--ink);
    box-shadow:0 0 14px rgba(246,225,192,.55), 0 0 0 1px rgba(224,123,57,.35);
  }
  .exp-mid{
    background:linear-gradient(160deg, #8B7C69 0%, #5E5344 60%, #463D31 100%);
    color:#F4EEE2;
  }
  .exp-mid .fmeta{opacity:.8;}
  .exp-dense{
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 2px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
      radial-gradient(140% 120% at 50% 20%, #33291F, var(--dense) 70%);
    color:var(--edge);
  }
  .exp-dense .ftitle{color:var(--edge);}
  .exp-dense .fmeta{color:#C9B889;opacity:.85;}

  /* Fogged / no-image frame */
  .exp-fog{
    background:linear-gradient(150deg,#C4C0B8,#A9A59D 55%,#B7B3AB);
    color:#4A463F;
    justify-content:center;
    align-items:center;
    text-align:center;
  }
  .exp-fog .ftitle{font-size:22px;opacity:.5;}
  .fog-stamp{
    position:absolute;
    inset:0;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-16deg);
    font-family:var(--mono);
    font-size:12px;font-weight:600;letter-spacing:.12em;
    color:rgba(60,55,48,.7);
    text-transform:uppercase;
    line-height:1.5;
    border:0;
    pointer-events:none;
  }
  .fog-stamp span{
    border:2px solid rgba(60,55,48,.5);
    padding:6px 10px;border-radius:3px;
  }

  /* Grease-pencil circle + annotation on the "print this one" frames */
  .greasecircle{
    position:absolute;
    inset:-6px -4px;
    width:calc(100% + 8px);
    height:calc(100% + 12px);
    pointer-events:none;
    z-index:4;
    overflow:visible;
  }
  .greasecircle path{
    fill:none;
    stroke:var(--green);
    stroke-width:3.2;
    stroke-linecap:round;
    opacity:.9;
    filter:drop-shadow(0 1px 0 rgba(46,125,91,.35));
  }
  .pencil-note{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--green);
    font-weight:600;
    padding:5px 12px 0;
    text-align:center;
    flex:0 0 auto;
    transform:rotate(-1.2deg);
  }

  /* ---------- Leader frame (SMPTE countdown) ---------- */
  .exp-leader{
    background:radial-gradient(120% 120% at 50% 45%, #FFFDF6, #F3E9D3 100%);
    color:var(--ink);
    justify-content:center;
    align-items:center;
    padding:8px;
    box-shadow:0 0 0 1px rgba(224,123,57,.4);
  }
  .leader-svg{position:absolute;inset:0;width:100%;height:100%;}
  .leader-svg .grid{stroke:rgba(31,27,24,.55);stroke-width:1.5;fill:none;}
  .leader-svg .ring{stroke:rgba(31,27,24,.5);stroke-width:2;fill:none;}
  .leader-svg .sweep{
    stroke:rgba(31,27,24,.75);stroke-width:3;
    transform-origin:50% 50%;
    animation:sweep 2s linear 1 both;
  }
  @keyframes sweep{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .leader-num{
    position:relative;
    font-family:var(--disp);
    font-size:120px;
    line-height:1;
    color:var(--ink);
    text-shadow:0 2px 0 rgba(255,255,255,.6);
    z-index:2;
  }
  .leader-cap{
    position:absolute;
    left:0;right:0;
    text-align:center;
    font-family:var(--mono);
    font-size:9px;letter-spacing:.14em;line-height:1.7;
    text-transform:uppercase;
    color:rgba(31,27,24,.72);
    z-index:2;
    padding:0 6px;
  }
  .leader-cap.top{top:12px;}
  .leader-cap.bottom{bottom:12px;}

  /* ---------- Tail frame ---------- */
  .exp-tail{
    background:radial-gradient(120% 120% at 50% 30%, #2C241C, #1A1510 90%);
    color:var(--edge);
    justify-content:center;align-items:center;text-align:center;
    box-shadow:0 0 0 1px rgba(224,123,57,.3);
  }
  .exp-tail .tail-txt{
    font-family:var(--mono);font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;line-height:1.9;color:var(--edge);opacity:.85;
  }
  .exp-tail .tail-mark{
    font-family:var(--disp);font-size:34px;color:var(--neg-glow);margin-bottom:10px;
  }

  /* ---------- Splice ---------- */
  .splice{
    flex:0 0 96px;
    width:96px;
    background:var(--base);
    position:relative;
    border-top:2px solid rgba(196,106,50,.55);
    border-bottom:2px solid rgba(196,106,50,.55);
    overflow:hidden;
  }
  .splice .cut{
    position:absolute;inset:0;
    background:
      linear-gradient(115deg, transparent 46%, rgba(0,0,0,.55) 47%, rgba(255,255,255,.15) 49%, rgba(0,0,0,.55) 51%, transparent 52%);
  }
  .splice .tape{
    position:absolute;
    top:50%;left:50%;
    width:150px;height:44px;
    transform:translate(-50%,-50%) rotate(25deg);
    background:rgba(232,224,205,.28);
    border-top:1px solid rgba(255,255,255,.35);
    border-bottom:1px solid rgba(0,0,0,.25);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.3);
  }
  .splice .tape span{
    font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;
    text-transform:uppercase;color:#EFE9D8;text-align:center;line-height:1.3;
    text-shadow:0 1px 1px rgba(0,0,0,.4);
  }

  /* ---------- Scrub ruler ---------- */
  .ruler{
    position:fixed;
    left:5%;right:5%;
    bottom:34px;
    z-index:20;
    pointer-events:none;
  }
  .ruler-line{
    position:relative;
    height:1px;
    background:linear-gradient(90deg, transparent, rgba(31,27,24,.4) 8%, rgba(31,27,24,.4) 92%, transparent);
  }
  .ruler-line::before{
    content:"";position:absolute;left:0;right:0;top:-4px;height:9px;
    background-image:repeating-linear-gradient(90deg, rgba(31,27,24,.28) 0 1px, transparent 1px 40px);
  }
  .ruler-marker{
    position:absolute;top:-6px;
    width:2px;height:13px;
    background:var(--neg);
    transform:translateX(-50%);
    transition:left .1s linear;
    box-shadow:0 0 6px rgba(224,123,57,.7);
  }
  .ruler-count{
    text-align:center;
    margin-top:9px;
    font-family:var(--mono);
    font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink);
    opacity:.82;
  }
  .ruler-count b{color:var(--neg);}

  /* ---------- Loupe (detail dialog) ---------- */
  .scrim{
    position:fixed;inset:0;
    background:rgba(20,17,14,.28);
    backdrop-filter:blur(1.5px);
    display:none;
    align-items:center;justify-content:center;
    z-index:60;
    padding:20px;
  }
  .scrim.open{display:flex;}
  .loupe{
    position:relative;
    width:min(520px,90vw);
    height:min(520px,90vw);
    max-height:92vh;
    border-radius:50%;
    background:
      radial-gradient(120% 120% at 50% 30%, #FFFDF6, #F2E7D0 100%);
    box-shadow:
      0 0 0 10px #211D19,
      0 0 0 13px #3B3630,
      0 0 0 15px rgba(224,123,57,.5),
      0 30px 60px rgba(20,17,14,.5),
      inset 0 0 60px rgba(224,123,57,.12);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
    padding:clamp(28px,7vw,58px);
    transform:scale(1);
  }
  .scrim.open .loupe{animation:drop .16s ease-out both;}
  @keyframes drop{from{transform:scale(.96);opacity:.4;}to{transform:scale(1);opacity:1;}}

  .loupe .l-code{
    font-family:var(--mono);font-size:10px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--neg);margin-bottom:8px;
  }
  .loupe .l-title{
    font-family:var(--disp);font-weight:400;text-transform:uppercase;
    line-height:.9;font-size:clamp(30px,7vw,46px);
    color:var(--ink);margin:0 0 10px;letter-spacing:.01em;
  }
  .loupe .l-where{
    font-family:var(--read);font-size:14px;color:var(--ink);opacity:.82;margin:0 0 3px;
  }
  .loupe .l-when{
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink);opacity:.7;margin:0 0 18px;
  }
  .loupe .l-occ{
    margin:0 0 4px;line-height:.95;
  }
  .loupe .l-occ .big{
    font-family:var(--disp);font-size:clamp(48px,13vw,74px);color:var(--green);
    display:block;
  }
  .loupe .l-occ.crowd .big{color:var(--ink);}
  .loupe .l-occ.na .big{color:#8a857c;}
  .loupe .l-occline{
    font-family:var(--read);font-size:14.5px;font-weight:600;color:var(--ink);
    margin:2px 0 14px;max-width:26ch;
  }
  .loupe .l-conf{
    font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);opacity:.62;margin:0 0 20px;
  }
  .loupe .l-btn{
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    background:var(--ink);color:var(--pencil);
    border:0;border-radius:2px;
    padding:13px 26px;cursor:pointer;text-decoration:none;
    display:inline-block;
    transition:transform .12s ease, background .12s ease;
  }
  .loupe .l-btn:hover{transform:translateY(-1px);background:#000;}
  .loupe .l-btn:focus-visible{outline:3px solid var(--neg);outline-offset:3px;}
  .loupe .l-close{
    position:absolute;top:calc(50% - min(260px,45vw) + 6px);
    right:clamp(8px,6%,34px);
    width:36px;height:36px;border-radius:50%;
    border:0;background:rgba(31,27,24,.08);
    color:var(--ink);font-size:20px;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .loupe .l-close:hover{background:rgba(31,27,24,.16);}
  .loupe .l-close:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}

  .sr-only{
    position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
    clip:rect(0,0,0,0);white-space:nowrap;border:0;
  }

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    .leader-svg .sweep{animation:none;}
    .scrim.open .loupe{animation:none;}
    .frame{transition:none;}
    .frame:hover{transform:none;}
    html{scroll-behavior:auto;}
  }

  /* ---------- Mobile: vertical strip ---------- */
  @media (max-width:699px){
    body{overflow-x:hidden;overflow-y:auto;}
    .stage{position:static;display:block;}
    .viewport{
      overflow:visible;
      scroll-snap-type:none;
      cursor:default;
      width:100%;
    }
    .reel{
      flex-direction:column;
      align-items:center;
      height:auto;
      width:100%;
      max-width:100%;
      padding:96px 0 120px;
      filter:drop-shadow(0 10px 22px rgba(31,27,24,.2));
    }
    .cell{
      flex:0 0 auto;
      width:min(360px,92vw);
      max-width:92vw;
      flex-direction:row;
      align-items:stretch;
      border-top:0;border-bottom:0;
      border-left:2px solid rgba(196,106,50,.55);
      border-right:2px solid rgba(196,106,50,.55);
    }
    .cell::before{top:0;bottom:0;right:auto;left:0;width:5px;height:auto;
      background:linear-gradient(90deg, rgba(224,123,57,.45), transparent);}
    .cell::after{top:0;bottom:0;left:auto;right:0;width:5px;height:auto;
      background:linear-gradient(270deg, rgba(224,123,57,.45), transparent);}
    .spr{flex-direction:column;justify-content:space-around;padding:12px 7px;}
    .hole{width:18px;height:14px;}
    .mid{padding:14px 6px;flex:1 1 auto;}
    .edge{white-space:normal;overflow:visible;text-align:center;}
    .edge.bot{flex-direction:row;}
    .frame .ftitle{font-size:34px;}
    .splice{
      flex:0 0 auto;width:min(360px,92vw);max-width:92vw;height:80px;
      border-top:0;border-bottom:0;
      border-left:2px solid rgba(196,106,50,.55);
      border-right:2px solid rgba(196,106,50,.55);
    }
    .splice .cut{background:linear-gradient(25deg, transparent 46%, rgba(0,0,0,.55) 47%, rgba(255,255,255,.15) 49%, rgba(0,0,0,.55) 51%, transparent 52%);}
    .bench{position:absolute;flex-direction:column;gap:6px;font-size:10px;}
    .bench .r{text-align:left;}
    .ruler{display:none;}
    .exp-leader{padding:18px;}
    .leader-num{font-size:96px;}
  }

  @media (max-width:699px){
    .exp-leader,.exp-tail,.frame{min-height:210px;}
  }
</style>
</head>
<body>

<div class="bench" aria-hidden="true">
  <div class="l"><b>SoloCinema</b><span>editor's bench — regina, sk</span></div>
  <div class="r">wheel · drag · ← → to scrub<br>click a frame to inspect</div>
</div>

<main class="stage">
  <div class="viewport" id="viewport" tabindex="0" role="group" aria-label="Film reel of Regina showtimes. Use arrow keys to scrub, click a frame to inspect.">
    <div class="reel" id="reel"><!-- built by JS --></div>
  </div>
</main>

<div class="ruler" aria-hidden="true">
  <div class="ruler-line"><div class="ruler-marker" id="marker" style="left:0%"></div></div>
  <div class="ruler-count">FRAME <b id="counter">01</b> / 14</div>
</div>

<!-- Loupe dialog -->
<div class="scrim" id="scrim">
  <div class="loupe" role="dialog" aria-modal="true" aria-labelledby="l-title" id="loupe">
    <button class="l-close" id="l-close" aria-label="Close inspector">×</button>
    <div class="l-code" id="l-code"></div>
    <h2 class="l-title" id="l-title"></h2>
    <p class="l-where" id="l-where"></p>
    <p class="l-when" id="l-when"></p>
    <div class="l-occ" id="l-occ"><span class="big" id="l-big"></span></div>
    <p class="l-occline" id="l-occline"></p>
    <p class="l-conf" id="l-conf"></p>
    <a class="l-btn" id="l-btn" href="#">Get tickets</a>
  </div>
</div>

<script>
(function(){
  "use strict";

  const SCREENINGS = [
   {id:1,title:"The Quiet Frame",theater:"Landmark Cinemas 8 Regina",code:"LMK8",chain:"Landmark",time:"2026-07-05T19:15",format:"Laser Ultra",occupied:0,total:84,confidence:"high",checkedMin:12},
   {id:2,title:"Northern Vacancy",theater:"Cineplex Odeon Southland Mall",code:"STHL",chain:"Cineplex",time:"2026-07-05T19:40",format:"Regular",occupied:0,total:112,confidence:"medium",checkedMin:23},
   {id:3,title:"Prairie Signal",theater:"Cineplex Cinemas Normanview",code:"NRMV",chain:"Cineplex",time:"2026-07-05T20:20",format:"Regular",occupied:1,total:116,confidence:"high",checkedMin:8},
   {id:4,title:"The Wascana Drift",theater:"Landmark Cinemas 8 Regina",code:"LMK8",chain:"Landmark",time:"2026-07-05T20:45",format:"Recliner",occupied:2,total:74,confidence:"high",checkedMin:12},
   {id:5,title:"Static Matinee",theater:"Rainbow Cinemas Golden Mile",code:"GMLE",chain:"Other",time:"2026-07-05T21:00",format:"Regular",occupied:3,total:180,confidence:"low",checkedMin:41},
   {id:6,title:"Copper Sky",theater:"Cineplex Cinemas Normanview",code:"NRMV",chain:"Cineplex",time:"2026-07-05T21:30",format:"3D",occupied:4,total:96,confidence:"medium",checkedMin:8},
   {id:7,title:"Midnight Elevator",theater:"Landmark Cinemas 8 Regina",code:"LMK8",chain:"Landmark",time:"2026-07-05T22:10",format:"Laser Ultra",occupied:6,total:84,confidence:"high",checkedMin:12},
   {id:8,title:"Hollow Harvest",theater:"Cineplex Odeon Southland Mall",code:"STHL",chain:"Cineplex",time:"2026-07-05T22:30",format:"IMAX",occupied:9,total:210,confidence:"high",checkedMin:23},
   {id:9,title:"Second Reel",theater:"Rainbow Cinemas Golden Mile",code:"GMLE",chain:"Other",time:"2026-07-06T13:30",format:"Regular",occupied:null,total:null,confidence:"low",checkedMin:41},
   {id:10,title:"Dust & Neon",theater:"Cineplex Cinemas Normanview",code:"NRMV",chain:"Cineplex",time:"2026-07-06T16:45",format:"VIP 19+",occupied:14,total:48,confidence:"medium",checkedMin:8},
   {id:11,title:"The Long Interval",theater:"Landmark Cinemas 8 Regina",code:"LMK8",chain:"Landmark",time:"2026-07-06T19:00",format:"Recliner",occupied:22,total:74,confidence:"high",checkedMin:12},
   {id:12,title:"Late Show North",theater:"Cineplex Odeon Southland Mall",code:"STHL",chain:"Cineplex",time:"2026-07-06T21:50",format:"Regular",occupied:31,total:112}
  ];

  const RM = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const reel = document.getElementById("reel");
  const viewport = document.getElementById("viewport");

  function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
  function isTomorrow(iso){return iso.slice(0,10) === "2026-07-06";}

  function fmtTime(iso){
    const d = new Date(iso);
    let h = d.getHours(), m = d.getMinutes();
    const ap = h >= 12 ? "PM" : "AM";
    let hh = h % 12; if(hh===0) hh = 12;
    const mm = String(m).padStart(2,"0");
    return (isTomorrow(iso) ? "TMRW " : "") + hh + ":" + mm + " " + ap;
  }
  function fmtTimePlain(iso){
    const d = new Date(iso);
    let h = d.getHours(), m = d.getMinutes();
    const ap = h >= 12 ? "PM" : "AM";
    let hh = h % 12; if(hh===0) hh = 12;
    const mm = String(m).padStart(2,"0");
    return hh + ":" + mm + " " + ap;
  }

  function expClass(occ){
    if(occ === null || occ === undefined) return "exp-fog";
    if(occ === 0) return "exp-empty";
    if(occ <= 4) return "exp-light";
    if(occ <= 9) return "exp-mid";
    return "exp-dense";
  }

  const SPROCKETS = '<div class="spr">'+'<span class="hole"></span>'.repeat(4)+'</div>';
  const EDGE_TOP = "SOLOCINEMA ▸ REGINA SK ▸ SAFETY FILM 5219 ▸ KEEP DARK";

  // Wobbly grease-pencil ellipse path
  const GREASE = '<svg class="greasecircle" viewBox="0 0 100 78" preserveAspectRatio="none" aria-hidden="true">'
    + '<path d="M50 3 C78 2 97 16 96 39 C95 62 74 76 49 75 C24 74 4 61 4 38 C4 17 22 4 50 3 Z" '
    + 'transform="rotate(-1.5 50 39)"/></svg>';

  function screeningCell(s, displayNum){
    const cls = expClass(s.occupied);
    const tomorrow = isTomorrow(s.time);
    const num = "SC-" + String(s.id).padStart(3,"0");
    const meta = fmtTime(s.time) + " · " + s.code + " · " + s.format.toUpperCase();
    const isEmpty = s.occupied === 0;
    const isFog = s.occupied === null || s.occupied === undefined;

    let occTxt;
    if(isFog) occTxt = "seat count unavailable";
    else if(isEmpty) occTxt = "0 of " + s.total + " seats — the room is yours";
    else occTxt = s.occupied + " of " + s.total + " seats taken";
    const aria = "Frame " + displayNum + " of 14. " + s.title + ", " + s.theater + ", "
      + fmtTimePlain(s.time) + (tomorrow ? " tomorrow" : " tonight") + ", " + s.format
      + ". " + occTxt + ". Click to inspect.";

    let inner;
    if(isFog){
      inner = '<div class="fog-stamp"><span>NO IMAGE<br>SEAT MAP UNAVAILABLE</span></div>'
        + '<h3 class="ftitle">'+esc(s.title)+'</h3>'
        + '<p class="fmeta">'+esc(meta)+'</p>';
    } else {
      inner = (isEmpty ? GREASE : "")
        + '<h3 class="ftitle">'+esc(s.title)+'</h3>'
        + '<p class="fmeta">'+esc(meta)+'</p>';
    }

    const note = isEmpty
      ? '<div class="pencil-note">PRINT THIS ONE ✓</div>'
      : '';

    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.frame = displayNum;
    cell.innerHTML =
      SPROCKETS +
      '<div class="stack">' +
        '<div class="edge top">'+EDGE_TOP+'</div>' +
        '<div class="mid">' +
          '<button class="frame '+cls+'" data-id="'+s.id+'" aria-label="'+esc(aria)+'">'+inner+'</button>' +
          note +
        '</div>' +
        '<div class="edge bot"><span class="num"><b>'+num+'</b></span><span>'+esc(s.code)+' · R1</span></div>' +
      '</div>' +
      SPROCKETS;
    return cell;
  }

  function leaderCell(){
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.frame = 1;
    const svg =
      '<svg class="leader-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">'
      + '<line class="grid" x1="50" y1="0" x2="50" y2="100"/>'
      + '<line class="grid" x1="0" y1="50" x2="100" y2="50"/>'
      + '<circle class="ring" cx="50" cy="50" r="42"/>'
      + '<circle class="ring" cx="50" cy="50" r="30" stroke-opacity="0.35"/>'
      + '<line class="sweep" x1="50" y1="50" x2="50" y2="8"/>'
      + '</svg>';
    cell.innerHTML =
      SPROCKETS +
      '<div class="stack">' +
        '<div class="edge top">'+EDGE_TOP+'</div>' +
        '<div class="mid">' +
          '<div class="frame exp-leader" tabindex="-1" aria-hidden="true">' +
            svg +
            '<div class="leader-cap top">SOLOCINEMA — A PICTURE FOR ONE<br>REGINA SASKATCHEWAN</div>' +
            '<div class="leader-num">5</div>' +
            '<div class="leader-cap bottom">12 SHOWINGS ON THIS REEL<br>SCRUB TO BEGIN ▶</div>' +
          '</div>' +
        '</div>' +
        '<div class="edge bot"><span class="num"><b>SC-000</b></span><span>LEADER · HEAD</span></div>' +
      '</div>' +
      SPROCKETS;
    return cell;
  }

  function tailCell(displayNum){
    const cell = document.createElement("div");
    cell.className = "cell";
    cell.dataset.frame = displayNum;
    cell.innerHTML =
      SPROCKETS +
      '<div class="stack">' +
        '<div class="edge top">'+EDGE_TOP+'</div>' +
        '<div class="mid">' +
          '<div class="frame exp-tail" tabindex="-1" aria-hidden="true">' +
            '<div class="tail-mark">■</div>' +
            '<div class="tail-txt">END OF REEL<br>MORE SHOWTIMES TOMORROW</div>' +
          '</div>' +
        '</div>' +
        '<div class="edge bot"><span class="num"><b>SC-END</b></span><span>TAIL · FOOT</span></div>' +
      '</div>' +
      SPROCKETS;
    return cell;
  }

  function spliceEl(){
    const s = document.createElement("div");
    s.className = "splice";
    s.setAttribute("aria-hidden","true");
    s.innerHTML = '<div class="cut"></div><div class="tape"><span>REEL CHANGE<br>TOMORROW</span></div>';
    return s;
  }

  // ---- Build the reel ----
  reel.appendChild(leaderCell());
  let displayNum = 2;
  let spliceInserted = false;
  SCREENINGS.forEach(s=>{
    if(!spliceInserted && isTomorrow(s.time)){
      reel.appendChild(spliceEl());
      spliceInserted = true;
    }
    reel.appendChild(screeningCell(s, displayNum));
    displayNum++;
  });
  reel.appendChild(tailCell(displayNum)); // frame 14

  // ---- Frame counter / ruler ----
  const counterEl = document.getElementById("counter");
  const markerEl = document.getElementById("marker");
  const totalFrames = 14;

  function updateCounter(){
    const vpRect = viewport.getBoundingClientRect();
    const center = vpRect.left + vpRect.width/2;
    let best = 1, bestDist = Infinity;
    reel.querySelectorAll(".cell").forEach(c=>{
      const r = c.getBoundingClientRect();
      const cc = r.left + r.width/2;
      const d = Math.abs(cc - center);
      if(d < bestDist){bestDist = d; best = parseInt(c.dataset.frame,10);}
    });
    counterEl.textContent = String(best).padStart(2,"0");
    const max = viewport.scrollWidth - viewport.clientWidth;
    const pct = max > 0 ? (viewport.scrollLeft / max) * 100 : 0;
    markerEl.style.left = Math.max(0,Math.min(100,pct)) + "%";
  }

  let ticking = false;
  viewport.addEventListener("scroll", ()=>{
    if(!ticking){ requestAnimationFrame(()=>{ updateCounter(); ticking=false; }); ticking=true; }
  }, {passive:true});

  // ---- Wheel: vertical -> horizontal scrub (desktop only) ----
  const isMobile = ()=> window.matchMedia("(max-width:699px)").matches;
  viewport.addEventListener("wheel", (e)=>{
    if(isMobile()) return;
    if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
      viewport.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, {passive:false});

  // ---- Drag to scrub ----
  let down=false, startX=0, startScroll=0, moved=false;
  viewport.addEventListener("pointerdown",(e)=>{
    if(isMobile()) return;
    if(e.button!==0) return;
    down=true; moved=false;
    startX=e.clientX; startScroll=viewport.scrollLeft;
    viewport.classList.add("dragging");
  });
  window.addEventListener("pointermove",(e)=>{
    if(!down) return;
    const dx = e.clientX - startX;
    if(Math.abs(dx) > 5) moved=true;
    viewport.scrollLeft = startScroll - dx;
  });
  window.addEventListener("pointerup",()=>{
    if(!down) return;
    down=false;
    viewport.classList.remove("dragging");
    // release drag flag shortly after to swallow the trailing click
    setTimeout(()=>{ moved=false; }, 0);
  });

  // ---- Arrow keys: advance one frame with smooth snap ----
  function cellsArray(){ return Array.from(reel.querySelectorAll(".cell")); }
  function centerOf(el){
    const r = el.getBoundingClientRect();
    const vp = viewport.getBoundingClientRect();
    return viewport.scrollLeft + (r.left - vp.left) + r.width/2 - vp.width/2;
  }
  function nearestIndex(){
    const cells = cellsArray();
    const target = viewport.scrollLeft;
    let best=0, bestD=Infinity;
    cells.forEach((c,i)=>{
      const d = Math.abs(centerOf(c) - target);
      if(d<bestD){bestD=d;best=i;}
    });
    return best;
  }
  function scrollToIndex(i){
    const cells = cellsArray();
    i = Math.max(0, Math.min(cells.length-1, i));
    viewport.scrollTo({left: centerOf(cells[i]), behavior: RM ? "auto" : "smooth"});
  }
  viewport.addEventListener("keydown",(e)=>{
    if(isMobile()) return;
    if(e.key==="ArrowRight"){ e.preventDefault(); scrollToIndex(nearestIndex()+1); }
    else if(e.key==="ArrowLeft"){ e.preventDefault(); scrollToIndex(nearestIndex()-1); }
    else if(e.key==="Home"){ e.preventDefault(); scrollToIndex(0); }
    else if(e.key==="End"){ e.preventDefault(); scrollToIndex(cellsArray().length-1); }
  });

  // ---- Loupe (detail dialog) ----
  const scrim = document.getElementById("scrim");
  const loupe = document.getElementById("loupe");
  const closeBtn = document.getElementById("l-close");
  const ticketBtn = document.getElementById("l-btn");
  let lastFocused = null;

  const byId = {};
  SCREENINGS.forEach(s=> byId[s.id]=s);

  function openLoupe(s){
    document.getElementById("l-code").textContent = "SC-" + String(s.id).padStart(3,"0") + " · REGINA SK";
    document.getElementById("l-title").textContent = s.title;
    document.getElementById("l-where").textContent = s.theater;
    const whenWord = isTomorrow(s.time) ? "Tomorrow" : "Tonight";
    document.getElementById("l-when").textContent = whenWord + " " + fmtTimePlain(s.time) + " · " + s.format;

    const occEl = document.getElementById("l-occ");
    const bigEl = document.getElementById("l-big");
    const lineEl = document.getElementById("l-occline");
    occEl.className = "l-occ";
    if(s.occupied === null || s.occupied === undefined){
      occEl.classList.add("na");
      bigEl.textContent = "—";
      lineEl.textContent = "Seat map unavailable — we couldn't read this room.";
    } else if(s.occupied === 0){
      bigEl.textContent = "0";
      lineEl.textContent = "0 of " + s.total + " seats taken — the room is yours.";
    } else {
      occEl.classList.add("crowd");
      bigEl.textContent = String(s.occupied);
      const pct = Math.round((s.occupied / s.total) * 100);
      lineEl.textContent = s.occupied + " of " + s.total + " seats taken — about " + pct + "% full.";
    }

    const conf = s.confidence ? s.confidence : "unrated";
    const checked = (s.checkedMin || s.checkedMin===0) ? ("checked " + s.checkedMin + " min ago") : "not recently checked";
    document.getElementById("l-conf").textContent = "Confidence: " + conf + " · " + checked;

    lastFocused = document.activeElement;
    scrim.classList.add("open");
    document.body.style.overflow = "hidden";
    closeBtn.focus();
  }

  function closeLoupe(){
    scrim.classList.remove("open");
    document.body.style.overflow = "";
    if(lastFocused && lastFocused.focus) lastFocused.focus();
  }

  // frame click -> loupe (ignore if it was a drag)
  reel.addEventListener("click",(e)=>{
    const btn = e.target.closest(".frame");
    if(!btn) return;
    if(moved){ return; }
    const id = btn.dataset.id;
    if(!id) return; // leader/tail are not clickable
    openLoupe(byId[+id]);
  });

  closeBtn.addEventListener("click", closeLoupe);
  scrim.addEventListener("mousedown",(e)=>{ if(e.target===scrim) closeLoupe(); });

  // Focus trap + Esc
  scrim.addEventListener("keydown",(e)=>{
    if(e.key==="Escape"){ e.preventDefault(); closeLoupe(); return; }
    if(e.key==="Tab"){
      const f = loupe.querySelectorAll('button, a[href], [tabindex]:not([tabindex="-1"])');
      const list = Array.from(f).filter(el=> el.offsetParent!==null || el===document.activeElement);
      if(list.length===0) return;
      const first = list[0], last = list[list.length-1];
      if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
    }
  });

  // ---- Auto-scrub hint on load: leader -> first screening ----
  function autoScrub(){
    if(RM) { updateCounter(); return; }
    const cells = cellsArray();
    const targetEl = cells[1]; // first screening frame
    if(!targetEl){ updateCounter(); return; }
    const from = viewport.scrollLeft;
    const to = centerOf(targetEl);
    const dur = 800;
    const t0 = performance.now();
    function ease(x){ return 1 - Math.pow(1-x, 3); }
    function step(now){
      const p = Math.min(1,(now-t0)/dur);
      viewport.scrollLeft = from + (to-from)*ease(p);
      updateCounter();
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // init
  window.addEventListener("resize", ()=> requestAnimationFrame(updateCounter));
  requestAnimationFrame(()=>{
    updateCounter();
    if(!isMobile()) setTimeout(autoScrub, 260);
  });
})();
</script>
</body>
</html>
