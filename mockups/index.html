<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SoloCinema — Design Directions</title>
<style>
  :root {
    --bg: #111113;
    --chrome: #1a1a1d;
    --line: rgba(255,255,255,0.10);
    --text: #e9e7e2;
    --muted: #8f8d88;
    --accent: #d8b36a;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .stage {
    position: relative;
    flex: 1;
    min-height: 0;
    background: #000;
  }
  .stage iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 240ms ease;
  }
  .stage iframe.active {
    opacity: 1;
    visibility: visible;
  }
  .bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    background: var(--chrome);
    border-top: 1px solid var(--line);
    font-size: 12px;
    line-height: 1.4;
  }
  .nav-btn {
    flex: none;
    width: 38px;
    height: 38px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 15px;
    cursor: pointer;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:focus-visible, .dot:focus-visible, .replay:focus-visible, .open:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .info { flex: 1; min-width: 0; }
  .info .name {
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .info .name .tag {
    margin-left: 8px;
    padding: 2px 6px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 0.08em;
  }
  .info .desc {
    margin-top: 2px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dots { display: flex; gap: 8px; }
  .dot {
    width: 26px;
    height: 26px;
    padding: 0;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  .dot[aria-current="true"] {
    border-color: var(--accent);
    background: var(--accent);
    color: #111;
    font-weight: 700;
  }
  .replay, .open {
    flex: none;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
  }
  .replay:hover, .open:hover { color: var(--accent); border-color: var(--accent); }
  .counter { flex: none; color: var(--muted); letter-spacing: 0.1em; }
  .hint { flex: none; color: var(--muted); }
  @media (max-width: 760px) {
    .bar { flex-wrap: wrap; gap: 10px; }
    .info { flex-basis: 100%; order: -1; }
    .info .desc { white-space: normal; }
    .hint { display: none; }
  }
</style>
</head>
<body>
  <div class="stage" id="stage"></div>
  <div class="bar">
    <button class="nav-btn" id="prev" aria-label="Previous design">←</button>
    <button class="nav-btn" id="next" aria-label="Next design">→</button>
    <div class="info">
      <div class="name" id="name"></div>
      <div class="desc" id="desc"></div>
    </div>
    <span class="counter" id="counter"></span>
    <div class="dots" id="dots" role="tablist" aria-label="Designs"></div>
    <button class="replay" id="replay" title="Reload the design to replay its load animation">Replay</button>
    <a class="open" id="open" target="_blank" rel="noopener">Open ↗</a>
    <span class="hint">← → or 1–5</span>
  </div>
<script>
  const DESIGNS = [
    { file: "designs/02-departures.html", name: "The Departures Board — Base",
      desc: "Your chosen base: the split-flap board with the full filter rail, colored seats-taken digits, and the flappable sign." },
    { file: "designs/board-a-sodium.html", name: "Sodium Glow",
      desc: "The board under sodium-vapor light — warm umber monochrome, ivory flaps, heavier and slower mechanical flips." },
    { file: "designs/board-b-ivory.html", name: "Ivory Hall",
      desc: "A daylit station hall — the page becomes a warm plaster wall with light controls; the board stays a dark object on it." },
    { file: "designs/board-c-cathode.html", name: "Cool Cathode",
      desc: "Ice-blue electronic — cyan replaces amber, sharper tiles, snappy sub-second flips, faster ambient reflips." },
    { file: "designs/board-d-marquee.html", name: "The Marquee",
      desc: "Movie-palace lobby — burgundy and gold, a chasing bulb strip on the sign, and flaps that settle with a tiny pop." },
  ];

  const stage = document.getElementById("stage");
  const dotsEl = document.getElementById("dots");
  const frames = DESIGNS.map((d, i) => {
    const f = document.createElement("iframe");
    f.title = d.name;
    f.loading = "lazy";
    stage.appendChild(f);
    const dot = document.createElement("button");
    dot.className = "dot";
    dot.textContent = i + 1;
    dot.setAttribute("aria-label", d.name);
    dot.addEventListener("click", () => go(i));
    dotsEl.appendChild(dot);
    return f;
  });

  let current = -1;
  function go(i) {
    current = (i + DESIGNS.length) % DESIGNS.length;
    const d = DESIGNS[current];
    frames.forEach((f, j) => {
      if (j === current && !f.src) f.src = d.file;
      f.classList.toggle("active", j === current);
    });
    // preload neighbors so switching is instant
    [current + 1, current - 1].forEach(n => {
      const j = (n + DESIGNS.length) % DESIGNS.length;
      if (!frames[j].src) frames[j].src = DESIGNS[j].file;
    });
    document.getElementById("name").innerHTML =
      d.name + (d.experimental ? ' <span class="tag">experimental</span>' : "");
    document.getElementById("desc").textContent = d.desc;
    document.getElementById("counter").textContent = (current + 1) + " / " + DESIGNS.length;
    document.getElementById("open").href = d.file;
    dotsEl.querySelectorAll(".dot").forEach((el, j) =>
      el.setAttribute("aria-current", j === current ? "true" : "false"));
    document.title = "SoloCinema — " + d.name;
  }

  document.getElementById("prev").addEventListener("click", () => go(current - 1));
  document.getElementById("next").addEventListener("click", () => go(current + 1));
  document.getElementById("replay").addEventListener("click", () => {
    frames[current].src = DESIGNS[current].file + "?r=" + Date.now();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") go(current - 1);
    else if (e.key === "ArrowRight") go(current + 1);
    else if (e.key >= "1" && e.key <= String(DESIGNS.length)) go(Number(e.key) - 1);
  });

  go(0);
</script>
</body>
</html>
