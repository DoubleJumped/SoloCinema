services:
  - type: cron
    name: solocinema-collector
    env: python
    plan: starter
    # Every 15 min, 2:00pm-9:45pm Regina time (UTC-6, no DST)
    schedule: "*/15 20-23,0-3 * * *"
    buildCommand: pip install -e ".[collector]"
    startCommand: python -m collector.solocinema_collector.cli run-all --database-url supabase
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CINEPLEX_SUBSCRIPTION_KEY
        sync: false
