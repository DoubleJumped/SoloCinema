services:
  - type: cron
    name: solocinema-collector
    env: python
    plan: starter
    # Every 15 min, 10:00am-11:45pm Regina time (UTC-6, no DST). The window
    # starts mid-morning because the Kramer IMAX runs 11:00am matinees, and
    # ends near midnight for its late Odyssey shows (10:05/11:00pm starts).
    schedule: "*/15 16-23,0-5 * * *"
    buildCommand: pip install -e ".[collector]"
    startCommand: python -m collector.solocinema_collector.cli run-all --database-url supabase
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CINEPLEX_SUBSCRIPTION_KEY
        sync: false
